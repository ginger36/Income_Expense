<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - ระบบรายรับ รายจ่าย</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg: #f0faff; 
--main: #0abab5; /* Tiffany Blue */
--dark: #0056b3; /* Dark Blue */
--accent: #e63946; /* Red */
--white: #ffffff;
--glow: rgba(10, 186, 181, 0.3);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
background: var(--bg);
display: flex;
justify-content: center;
}

.container{
max-width: 500px;
width: 100%;
padding: 20px 15px 40px;
}

.section {
background: var(--white);
border-radius: 20px;
padding: 25px 20px;
margin-bottom: 20px;
box-shadow: 0 8px 20px rgba(0,0,0,0.05);
border: 2px solid var(--main);
}

h1,h2,h3{color: var(--dark);}
.center {text-align: center;}

.logo{
width: 150px; height: 150px;
border-radius: 50%;
overflow: hidden;
margin: 0 auto 20px;
box-shadow: 0 6px 20px var(--glow);
border: 3px solid var(--main);
}

.logo img {width: 100%; height: 100%; object-fit: cover;}

.badges{
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 10px;
margin-bottom: 20px;
}

.badge{
background: var(--white);
padding: 8px 16px;
border-radius: 25px;
box-shadow: 0 4px 10px var(--glow);
font-size: 13px;
color: var(--dark);
border: 1px solid var(--main);
}

/* เพิ่ม CSS สำหรับการกรองข้อมูลโดยเฉพาะ */
.filter-box {
    margin-bottom: 15px;
    display: flex;
    gap: 5px;
}
input, select {
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--main);
    flex: 1;
}

.btn{
display: block;
text-align: center;
padding: 14px;
border-radius: 25px;
text-decoration: none;
margin-top: 15px;
font-weight: 500;
transition: 0.3s;
cursor: pointer;
border: none;
width: 100%;
}

.btn-outline {
background: transparent;
border: 2px dashed var(--main);
color: var(--dark);
}

.btn-main{
background: var(--main);
color: white;
}

.btn-accent{
background: var(--accent);
color: white;
}

.step {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 12px;
}

.step-num{
background: var(--dark);
color: white;
width: 26px; height: 26px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 13px;
flex-shrink: 0;
}

.price-row {
display: flex;
justify-content: space-between;
margin-bottom: 10px;
background: #f9ffff;
padding: 10px 15px;
border-radius: 15px;
border-left: 4px solid var(--accent);
}

.price-tag {
background: var(--main);
color: white;
padding: 3px 12px;
border-radius: 20px;
font-size: 14px;
}

.footer {
text-align: center;
margin-top: 30px;
}

.social {
display: flex;
gap: 8px;
justify-content: center;
margin-top: 15px;
}

.social a {
flex: 1;
max-width: 100px;
text-align: center;
padding: 8px;
border-radius: 25px;
background: var(--white);
text-decoration: none;
color: var(--dark);
font-size: 13px;
border: 1px solid var(--main);
}

.small {font-size: 12px; opacity: .7; margin-top: 10px;}

/* สไตล์เพิ่มเติมสำหรับรายการที่แสดง */
#displayList { margin-top: 15px; max-height: 200px; overflow-y: auto; }
.item-card { font-size: 14px; padding: 5px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
</style>
</head>

<body>
<div class="container">

<div class="section center" style="border:none; box-shadow:none; background:transparent;">
    <div class="logo">
        <img src="https://via.placeholder.com/150" alt="nongsorin logo">
    </div>
    <h1>nongsorin</h1>
    <p style="color: var(--dark); opacity: .8; margin: 10px 0 20px;">
        📊 ระบบสรุปยอด รายรับ-รายจ่าย
    </p>

    <div class="badges">
        <div class="badge" id="badge-month">เดือนนี้: 0</div>
        <div class="badge" id="badge-year" style="border-color: var(--accent);">ปีนี้: 0</div>
        <div class="badge">🧹 เคลียร์ได้</div>
    </div>

    <button onclick="calculateSummary()" class="btn btn-outline">
        🔍 กรองข้อมูลและสรุปยอด ✨
    </button>
</div>

<div class="section">
    <h2>📝 บันทึกรายการ</h2>
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
        <input type="text" id="desc" placeholder="รายการ (เช่น ขายของ, ค่าข้าว)">
        <input type="number" id="amount" placeholder="จำนวนเงิน">
        <select id="type">
            <option value="income">รายรับ (+)</option>
            <option value="expense">รายจ่าย (-)</option>
        </select>
        <input type="date" id="date">
    </div>
    <button onclick="addItem()" class="btn btn-main">บันทึกรายการ</button>
</div>

<div class="section">
    <h2>📅 รายการทั้งหมด</h2>
    <div class="filter-box">
        <select id="filterMonth" onchange="calculateSummary()">
            <option value="all">ทุกเดือน</option>
            <option value="0">มกราคม</option>
            <option value="1">กุมภาพันธ์</option>
            <option value="2">มีนาคม</option>
            <option value="3">เมษายน</option>
            <option value="4">พฤษภาคม</option>
            <option value="5">มิถุนายน</option>
            <option value="6">กรกฎาคม</option>
            <option value="7">สิงหาคม</option>
            <option value="8">กันยายน</option>
            <option value="9">ตุลาคม</option>
            <option value="10">พฤศจิกายน</option>
            <option value="11">ธันวาคม</option>
        </select>
    </div>
    
    <div id="displayList">
        </div>

    <button onclick="clearData()" class="btn btn-outline" style="margin-top: 10px; color: var(--accent); border-color: var(--accent);">ล้างข้อมูลทั้งหมด</button>
</div>

<div class="section">
    <h2>💰 สรุปยอดเงิน</h2>
    <div class="price-row"><span>รายรับรวม</span><span class="price-tag" id="totalIncome">0฿</span></div>
    <div class="price-row"><span>รายจ่ายรวม</span><span class="price-tag" style="background:var(--accent)" id="totalExpense">0฿</span></div>
    <div class="price-row"><span>ยอดคงเหลือ</span><span class="price-tag" id="netBalance">0฿</span></div>

    <a href="#" class="btn btn-accent">ดาวน์โหลดรายงาน (CSV)</a>
</div>

<div class="footer">
    <a href="#" class="btn btn-main">ติดต่อสอบถามคลิก 🎀</a>
    <div class="social">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Line</a>
    </div>
    <p class="small">© 2026 nongsorin - Financial Tracker</p>
</div>

</div>

<script>
    // ระบบจัดการข้อมูล
    let transactions = JSON.parse(localStorage.getItem('nongsorin_data')) || [];

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;

        if(!desc || !amount || !date) return alert('กรุณากรอกข้อมูลให้ครบ');

        transactions.push({ desc, amount, type, date: new Date(date).toISOString() });
        localStorage.setItem('nongsorin_data', JSON.stringify(transactions));
        
        // ล้างค่า
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        calculateSummary();
    }

    function calculateSummary() {
        const filterMonth = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';

        let income = 0;
        let expense = 0;
        let yearTotal = 0;

        const currentYear = new Date().getFullYear();

        transactions.forEach((item, index) => {
            const itemDate = new Date(item.date);
            const isMatchMonth = filterMonth === 'all' || itemDate.getMonth().toString() === filterMonth;
            
            // สรุปยอดรายปี (ของปีปัจจุบัน)
            if(itemDate.getFullYear() === currentYear) {
                yearTotal += (item.type === 'income' ? item.amount : -item.amount);
            }

            if (isMatchMonth) {
                if(item.type === 'income') income += item.amount;
                else expense += item.amount;

                // แสดงรายการ
                listDiv.innerHTML += `
                    <div class="item-card">
                        <span>${item.desc} (${new Date(item.date).toLocaleDateString('th-TH')})</span>
                        <span style="color:${item.type === 'income' ? 'green' : 'red'}">
                            ${item.type === 'income' ? '+' : '-'}${item.amount.toLocaleString()}
                        </span>
                    </div>
                `;
            }
        });

        document.getElementById('totalIncome').innerText = income.toLocaleString() + '฿';
        document.getElementById('totalExpense').innerText = expense.toLocaleString() + '฿';
        document.getElementById('netBalance').innerText = (income - expense).toLocaleString() + '฿';
        document.getElementById('badge-month').innerText = 'เดือนนี้: ' + (income - expense).toLocaleString();
        document.getElementById('badge-year').innerText = 'ปีนี้: ' + yearTotal.toLocaleString();
    }

    function clearData() {
        if(confirm('ต้องการลบข้อมูลทั้งหมดใช่หรือไม่?')) {
            transactions = [];
            localStorage.removeItem('nongsorin_data');
            calculateSummary();
        }
    }

    // โหลดข้อมูลครั้งแรก
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
