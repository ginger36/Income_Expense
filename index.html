<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Pro Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #81e6e2;  
    --navy: #5c85d6;     
    --red: #f28d8d;      
    --dark-navy: #3d5a94;
    --text: #2d3748;
    --section-bg: rgba(255, 255, 255, 0.95);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    /* เปลี่ยนพื้นหลังให้มีสีสันมากขึ้น */
    background: linear-gradient(135deg, #e0f7f6 0%, #e2ebf0 50%, #f9e2e2 100%);
    background-attachment: fixed;
    color: var(--text);
}

.container { max-width: 500px; width: 92%; padding: 40px 0 100px; }

/* --- ส่วนโลโก้และอิโมจิรอบๆ --- */
.header-section { margin-bottom: 40px; text-align: center; position: relative; }
.logo-area {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto;
}
.logo {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 4px solid #fff;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    z-index: 10;
}
.logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

.orbit {
    position: absolute;
    font-size: 28px;
    animation: floating 3s ease-in-out infinite alternate;
}
/* เว้นระยะห่างอิโมจิออกไปรอบๆ */
.e1 { top: 10%; left: 10%; animation-delay: 0s; }
.e2 { top: 10%; right: 10%; animation-delay: 0.5s; }
.e3 { bottom: 15%; left: 5%; animation-delay: 1s; }
.e4 { bottom: 15%; right: 5%; animation-delay: 1.5s; }

@keyframes floating { from { transform: translateY(0); } to { transform: translateY(-15px); } }

/* --- บล็อกดีไซน์ใหม่ --- */
.section {
    background: var(--section-bg);
    border-radius: 30px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(92, 133, 214, 0.15);
    border: 2px solid transparent;
    background-clip: padding-box;
    position: relative;
}

/* เพิ่มขอบสีตามคอนเซปต์ */
.section.input-box { border-color: var(--tiffany); }
.section.chart-box { border-color: var(--navy); }
.section.list-box { border-color: var(--red); }

h2 { font-size: 18px; color: var(--dark-navy); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full-width { grid-column: span 2; }

input, select {
    background: #f7fafc;
    border: 2px solid #edf2f7;
    padding: 12px;
    border-radius: 15px;
    outline: none;
    font-size: 14px;
}
input:focus { border-color: var(--navy); }

.btn-main {
    width: 100%;
    background: linear-gradient(135deg, var(--navy), var(--dark-navy));
    color: #fff; border: none; padding: 16px; border-radius: 20px;
    font-size: 16px; margin-top: 15px; cursor: pointer;
    box-shadow: 0 8px 15px rgba(92, 133, 214, 0.3);
}

/* --- สรุปยอดเงิน --- */
.summary-card {
    display: flex; flex-direction: column; gap: 10px; margin-top: 20px;
}
.res-box {
    display: flex; justify-content: space-between; padding: 15px 20px;
    border-radius: 18px; font-weight: 500;
}
.res-in { background: var(--tiffany); color: #000; }
.res-out { background: var(--red); color: #fff; }
.res-net { background: var(--navy); color: #fff; font-size: 20px; }

/* --- รายละเอียดการใช้จ่าย (Spending Breakdown) --- */
.spending-detail {
    margin-top: 20px;
    background: #fcfcfc;
    border-radius: 20px;
    padding: 15px;
}
.spending-item {
    display: flex; justify-content: space-between;
    font-size: 13px; padding: 8px 0;
    border-bottom: 1px dashed #eee;
}
.spending-item:last-child { border: none; }

.footer-text { text-align: center; font-size: 11px; color: #a0aec0; margin-top: 40px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="logo-area">
            <span class="orbit e1">🐳</span>
            <span class="orbit e2">🐠</span>
            <span class="orbit e3">🦋</span>
            <span class="orbit e4">🪼</span>
            <div class="logo">
                <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
            </div>
        </div>
        <h1 style="color: var(--dark-navy); font-size: 32px; margin-top: 10px;">nongsorin</h1>
    </div>

    <div class="section input-box">
        <h2>📝 เพิ่มรายการ</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="เช่น ค่าข้าว, ขายเสื้อผ้า" class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน (ถ้ามี)">
            <input type="number" id="price" placeholder="ยอดเงินสุทธิ">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกลงสมุด 🌸</button>
    </div>

    <div class="section chart-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2>📊 วิเคราะห์กำไร</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 5px; border-radius: 10px;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>

        <div style="max-width: 220px; margin: 0 auto;">
            <canvas id="profitChart"></canvas>
        </div>

        <div class="summary-card">
            <div class="res-box res-in"><span>รายรับ</span><span id="sumIn">0</span></div>
            <div class="res-box res-out"><span>รายจ่าย</span><span id="sumOut">0</span></div>
            <div class="res-box res-net"><span>กำไรสุทธิ</span><span id="sumNet">0</span></div>
        </div>

        <div class="spending-detail">
            <p style="font-size: 14px; font-weight: 500; color: var(--navy); margin-bottom: 10px;">💸 รายจ่ายแยกตามรายการ:</p>
            <div id="spendList">
                </div>
        </div>
    </div>

    <div class="section list-box">
        <h2>📅 ประวัติรายการ</h2>
        <div id="displayList"></div>
    </div>

    <p class="footer-text">CREATED BY NONGSORIN • 2026</p>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('sorin_tracker_v4')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date || price <= 0) return alert('กรุณากรอกข้อมูลให้ครบจ้ะ');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('sorin_tracker_v4', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        const spendDiv = document.getElementById('spendList');
        
        listDiv.innerHTML = '';
        spendDiv.innerHTML = '';
        
        let tIn = 0, tOut = 0;
        let expenseMap = {}; // สำหรับเก็บยอดรวมรายจ่ายแต่ละชื่อ

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;

            if(isMatch) {
                if(item.type === 'income') {
                    tIn += item.price;
                } else {
                    const totalCost = item.price + item.cost;
                    tOut += totalCost;
                    // รวมยอดใช้จ่ายตามชื่อรายการ
                    expenseMap[item.desc] = (expenseMap[item.desc] || 0) + totalCost;
                }

                listDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                        <span>${item.desc} <br><small>${item.date}</small></span>
                        <span style="color:${item.type==='income'?'#48bb78':'#f56565'}">
                            ${item.type==='income'?'+':'-'}${item.price.toLocaleString()}
                        </span>
                    </div>`;
            }
        });

        // แสดงรายการใช้จ่ายแยกย่อย
        Object.entries(expenseMap).sort((a,b) => b[1] - a[1]).forEach(([name, val]) => {
            spendDiv.innerHTML += `
                <div class="spending-item">
                    <span>${name}</span>
                    <b style="color:var(--red)">-${val.toLocaleString()} ฿</b>
                </div>`;
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; opacity:0.5;">ไม่มีข้อมูลในเดือนนี้</p>';
        if(!spendDiv.innerHTML) spendDiv.innerHTML = '<p style="font-size:12px; opacity:0.5;">ไม่มีรายจ่าย</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไรสุทธิ'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#81e6e2', '#f28d8d', '#5c85d6'],
                    borderWidth: 5,
                    borderColor: '#fff'
                }]
            },
            options: { cutout: '65%', plugins: { legend: { display: false } } }
        });
    }

    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
