<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Elegant Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #0abab5;
    --navy: #002d5e;
    --glam-gold: #d4af37;
    --soft-white: rgba(255, 255, 255, 0.85);
    --bg-faded: radial-gradient(circle at top left, #e0f7f6, #fdfbfb, #eef2f3, #f7e9e9);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: var(--bg-faded);
    background-size: 200% 200%;
    animation: meshBG 20s ease infinite;
    position: relative;
    color: var(--navy);
}

@keyframes meshBG {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
}

/* อิโมจิฟุ้งๆ สไตล์มินิมอล */
.bg-emoji {
    position: fixed;
    z-index: -1;
    opacity: 0.3;
    filter: blur(1px);
    animation: floatEmoji 15s linear infinite;
}

@keyframes floatEmoji {
    0% { transform: translateY(110vh) translateX(0) rotate(0deg); }
    100% { transform: translateY(-20vh) translateX(20px) rotate(360deg); }
}

.container {
    max-width: 500px;
    width: 92%;
    padding: 40px 0 100px;
}

/* หัวข้อและโลโก้ */
.header-section { margin-bottom: 40px; text-align: center; }
.logo {
    width: 110px; height: 110px;
    border-radius: 50%;
    margin: 0 auto 20px;
    border: 3px solid #fff;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
}
.logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

h1 { font-weight: 500; letter-spacing: 1px; font-size: 28px; margin-bottom: 8px; color: var(--navy); }
.subtitle { font-weight: 300; font-size: 13px; opacity: 0.6; color: var(--navy); }

/* สไตล์กล่องข้อความ "แกรม" มินิมอล */
.section {
    background: var(--soft-white);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px;
    padding: 30px;
    margin-bottom: 30px;
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 20px 50px rgba(0,0,0,0.04);
    transition: transform 0.4s ease;
}

h2 { font-size: 17px; font-weight: 500; margin-bottom: 20px; opacity: 0.8; text-align: left; display: flex; align-items: center; gap: 10px; }

/* Input สไตล์เรียบหรู */
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.full-width { grid-column: span 2; }

input, select {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.05);
    padding: 12px 18px;
    border-radius: 20px;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
    color: var(--navy);
}
input:focus { border-color: var(--tiffany); background: #fff; box-shadow: 0 5px 15px rgba(10,186,181,0.1); }

/* ปุ่ม Glam Gradient */
.btn-main {
    width: 100%;
    background: linear-gradient(135deg, var(--navy), #004b9e);
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 400;
    margin-top: 20px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,45,94,0.2);
    transition: 0.3s;
}
.btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,45,94,0.3); }

/* Stats & Results */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
.stat-box {
    background: rgba(255,255,255,0.6);
    padding: 20px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.8);
    text-align: center;
}
.stat-label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 18px; font-weight: 500; display: block; margin-top: 5px; }

.result-row {
    display: flex; justify-content: space-between; padding: 16px 20px;
    border-radius: 25px; margin-bottom: 12px; font-size: 14px;
}
.row-income { background: #eaf9f8; color: #00796b; }
.row-expense { background: #fff1f1; color: #d32f2f; }
.row-profit { background: var(--navy); color: #fff; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

/* ประวัติรายการ */
.item-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.03);
}
.item-card:last-child { border: none; }
.item-info b { font-weight: 500; font-size: 15px; color: var(--navy); }
.item-info small { display: block; font-size: 11px; opacity: 0.4; margin-top: 4px; }
.item-amount { text-align: right; font-weight: 500; font-size: 15px; }

/* Chart */
.chart-container { margin: 20px auto; max-width: 220px; }

.footer-text { text-align: center; font-size: 11px; opacity: 0.3; margin-top: 40px; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="emoji-container"></div>

<div class="container">
    <div class="header-section">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
        </div>
        <h1>nongsorin</h1>
        <p class="subtitle">Personal Profit Journal & Style</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Month Profit</span>
                <span id="badge-month" class="stat-value">0 ฿</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Year Total</span>
                <span id="badge-year" class="stat-value" style="color: var(--tiffany);">0 ฿</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>📝 New Transaction</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="รายการของคุณ..." class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ราคาขาย">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกข้อมูล ✨</button>
    </div>

    <div class="section">
        <h2>📊 Statistics</h2>
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
        <div class="result-row row-income">
            <span>Total Revenue</span>
            <span id="sumIn">0 ฿</span>
        </div>
        <div class="result-row row-expense">
            <span>Total Expenses</span>
            <span id="sumOut">0 ฿</span>
        </div>
        <div class="result-row row-profit">
            <span style="font-weight: 300;">Net Profit</span>
            <span id="sumNet" style="font-size: 18px;">0 ฿</span>
        </div>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="margin:0;">📅 History</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 5px 10px; border-radius: 12px; font-size: 12px;">
                <option value="all">All Months</option>
                <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
                <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
                <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
            </select>
        </div>
        <div id="displayList"></div>
        <p onclick="clearData()" style="text-align:center; font-size:10px; color:#ccc; margin-top:30px; cursor:pointer; text-decoration: underline;">Clear Journal</p>
    </div>

    <p class="footer-text">DESIGNED BY NONGSORIN • 2026</p>
</div>

<script>
    // สุ่มอิโมจิฟุ้งๆ
    const emojis = ['🦋', '🪼', '🐳', '🐠', 'Ⓜ️'];
    function createEmoji() {
        const e = document.createElement('div');
        e.className = 'bg-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 20 + 20) + 'px';
        e.style.animationDuration = (Math.random() * 10 + 10) + 's';
        document.getElementById('emoji-container').appendChild(e);
        setTimeout(() => e.remove(), 15000);
    }
    setInterval(createEmoji, 3000);

    let transactions = JSON.parse(localStorage.getItem('glam_tracker_data')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date) return alert('กรุณาระบุรายละเอียดให้ครบถ้วนนะคะ ✨');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('glam_tracker_data', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';
        let tIn = 0, tOut = 0, yNet = 0;
        const currYear = new Date().getFullYear();

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;
            const profit = item.type === 'income' ? (item.price - item.cost) : -item.cost;

            if(d.getFullYear() === currYear) yNet += profit;

            if(isMatch) {
                if(item.type === 'income') tIn += item.price;
                else tOut += item.cost;

                listDiv.innerHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <b>${item.desc}</b>
                            <small>${d.toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</small>
                        </div>
                        <div class="item-amount" style="color:${profit>=0?'#00796b':'#d32f2f'}">
                            ${profit.toLocaleString()} ฿
                        </div>
                    </div>`;
            }
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-month').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-year').innerText = yNet.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">No records found.</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Revenue', 'Expenses', 'Profit'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#0abab5', '#ff8a80', '#002d5e'],
                    borderWidth: 0,
                    hoverOffset: 5
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function clearData() { if(confirm('ต้องการเริ่มบันทึกใหม่ทั้งหมดใช่ไหมคะ?')) { transactions = []; localStorage.clear(); calculateSummary(); } }
    
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
