<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Ultra Tracker ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #81e6e2;  
    --navy: #5c85d6;     
    --red: #f28d8d;      
    --dark-navy: #3d5a94;
    --glass: rgba(255, 255, 255, 0.8);
    --grad-main: linear-gradient(135deg, var(--tiffany), var(--navy));
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: linear-gradient(135deg, #e0f2f1 0%, #e8eaf6 50%, #fce4ec 100%);
    background-attachment: fixed;
    color: #333;
    overflow-x: hidden;
}

/* --- อิโมจิพื้นหลังดุ๊กดิ๊ก --- */
#bg-emojis {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none;
}
.float-bg {
    position: absolute;
    opacity: 0.3;
    animation: moveAround linear infinite;
}
@keyframes moveAround {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(100vw, -100vh) rotate(360deg); }
}

.container { max-width: 500px; width: 92%; padding: 40px 0 100px; position: relative; z-index: 1; }

/* --- ส่วนโลโก้ No-Border + แสงฟุ้ง --- */
.header-section { margin-bottom: 50px; text-align: center; position: relative; }
.logo-container {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto;
}
.logo-glow {
    width: 110px; height: 110px;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    /* แสงออร่าแทนขอบ */
    box-shadow: 0 0 40px 10px var(--tiffany), 0 0 70px 20px rgba(92, 133, 214, 0.4);
    background: #fff;
    overflow: hidden;
    z-index: 5;
}
.logo-glow img { width: 100%; height: 100%; object-fit: cover; }

.orbit {
    position: absolute;
    font-size: 28px;
    z-index: 6;
    animation: orbitFloat 4s ease-in-out infinite alternate;
}
@keyframes orbitFloat { from { transform: translateY(0); } to { transform: translateY(-20px); } }

.e1 { top: 0; left: 0; }
.e2 { top: 0; right: 0; animation-delay: 0.5s; }
.e3 { bottom: 20px; left: -10px; animation-delay: 1s; }
.e4 { bottom: 20px; right: -10px; animation-delay: 1.5s; }

/* --- บล็อกไล่สี & Glassmorphism --- */
.section {
    background: var(--glass);
    backdrop-filter: blur(10px);
    border-radius: 35px;
    padding: 28px;
    margin-bottom: 25px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.05);
    border: 1px solid rgba(255, 255, 255, 0.5);
    transition: 0.3s;
}
.section:hover { transform: scale(1.02); }

h2 { font-size: 19px; color: var(--dark-navy); margin-bottom: 22px; display: flex; align-items: center; gap: 10px; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.full-width { grid-column: span 2; }

input, select {
    background: rgba(255, 255, 255, 0.8);
    border: 1.5px solid #eee;
    padding: 14px;
    border-radius: 18px;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}
input:focus { border-color: var(--tiffany); box-shadow: 0 0 15px rgba(129, 230, 226, 0.3); }

/* ปุ่มกดแบบจึ้งไล่สี */
.btn-main {
    width: 100%;
    background: linear-gradient(45deg, var(--tiffany), var(--navy), var(--dark-navy));
    background-size: 200% auto;
    color: #fff; border: none; padding: 18px; border-radius: 22px;
    font-size: 17px; font-weight: 500; margin-top: 15px; cursor: pointer;
    box-shadow: 0 10px 25px rgba(92, 133, 214, 0.3);
    transition: 0.5s;
}
.btn-main:hover { background-position: right center; transform: translateY(-3px); }

/* --- สรุปยอดเงินแบบการ์ดหรู --- */
.res-box {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 25px; border-radius: 22px; margin-bottom: 12px;
    font-weight: 500; transition: 0.3s;
}
.res-in { background: linear-gradient(90deg, #e0f2f1, var(--tiffany)); color: #00796b; border-right: 6px solid #4db6ac; }
.res-out { background: linear-gradient(90deg, #ffebee, var(--red)); color: #c62828; border-right: 6px solid #e57373; }
.res-net { background: var(--grad-main); color: #fff; font-size: 22px; box-shadow: 0 10px 20px rgba(92, 133, 214, 0.2); }

.spending-detail {
    margin-top: 25px; background: rgba(255,255,255,0.4);
    border-radius: 25px; padding: 20px;
}
.spending-item {
    display: flex; justify-content: space-between;
    padding: 12px 5px; border-bottom: 1px solid rgba(0,0,0,0.05);
}

.footer-text { text-align: center; font-size: 12px; color: #999; margin-top: 50px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="bg-emojis"></div>

<div class="container">
    <div class="header-section">
        <div class="logo-container">
            <span class="orbit e1">🐳</span>
            <span class="orbit e2">🐠</span>
            <span class="orbit e3">🦋</span>
            <span class="orbit e4">🪼</span>
            <div class="logo-glow">
                <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
            </div>
        </div>
        <h1 style="color: var(--dark-navy); font-size: 34px; margin-top: 15px; letter-spacing: -1px;">nongsorin</h1>
        <p style="opacity: 0.5; font-size: 14px;">The Ultimate Financial Aesthetics ✨</p>
    </div>

    <div class="section">
        <h2>✨ บันทึกรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="รายการนี้คืออะไรคะ?" class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ยอดเงิน">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกข้อมูลแบบเริดๆ 💎</button>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h2>📊 บทวิเคราะห์ประจำเดือน</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 8px; border-radius: 12px; background: #fff; border: 1px solid #ddd;">
                <option value="all">ดูทั้งหมด</option>
                <option value="0">มกราคม</option><option value="1">กุมภาพันธ์</option><option value="2">มีนาคม</option>
                <option value="3">เมษายน</option><option value="4">พฤษภาคม</option><option value="5">มิถุนายน</option>
                <option value="6">กรกฎาคม</option><option value="7">สิงหาคม</option><option value="8">กันยายน</option>
                <option value="9">ตุลาคม</option><option value="10">พฤศจิกายน</option><option value="11">ธันวาคม</option>
            </select>
        </div>

        <div style="max-width: 230px; margin: 0 auto 30px;">
            <canvas id="profitChart"></canvas>
        </div>

        <div class="res-box res-in"><span>ยอดรับรวม</span><span id="sumIn">0</span></div>
        <div class="res-box res-out"><span>ยอดจ่ายรวม</span><span id="sumOut">0</span></div>
        <div class="res-box res-net"><span style="font-weight: 300;">กำไรสุทธิ</span><b id="sumNet">0</b></div>

        <div class="spending-detail">
            <p style="font-size: 15px; font-weight: 500; color: var(--dark-navy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                💸 รายการใช้จ่ายยอดฮิต
            </p>
            <div id="spendList"></div>
        </div>
    </div>

    <div class="section">
        <h2>📅 ประวัติที่ผ่านมา</h2>
        <div id="displayList"></div>
    </div>

    <p class="footer-text">DESIGNED BY NONGSORIN • 2026</p>
</div>

<script>
    // --- สุ่มสร้างอิโมจิพื้นหลัง ---
    const bgContainer = document.getElementById('bg-emojis');
    const emojis = ['🌸', '✨', '💎', '🐳', '💧', '🫧'];
    for(let i=0; i<15; i++) {
        let span = document.createElement('span');
        span.className = 'float-bg';
        span.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        span.style.left = Math.random()*100 + 'vw';
        span.style.top = Math.random()*100 + 'vh';
        span.style.fontSize = Math.random()*20 + 10 + 'px';
        span.style.animationDuration = Math.random()*10 + 15 + 's';
        span.style.animationDelay = Math.random()*5 + 's';
        bgContainer.appendChild(span);
    }

    let transactions = JSON.parse(localStorage.getItem('sorin_ultra_v1')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date || price <= 0) return alert('รบกวนกรอกรายละเอียดให้ครบถ้วนก่อนนะคะ ✨');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('sorin_ultra_v1', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        const spendDiv = document.getElementById('spendList');
        listDiv.innerHTML = ''; spendDiv.innerHTML = '';
        
        let tIn = 0, tOut = 0;
        let expenseMap = {};

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;

            if(isMatch) {
                if(item.type === 'income') {
                    tIn += item.price;
                } else {
                    const totalCost = item.price + item.cost;
                    tOut += totalCost;
                    expenseMap[item.desc] = (expenseMap[item.desc] || 0) + totalCost;
                }

                listDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.03);">
                        <span><b>${item.desc}</b><br><small style="color:#aaa">${item.date}</small></span>
                        <span style="color:${item.type==='income'?'#4db6ac':'#e57373'}; font-weight:500;">
                            ${item.type==='income'?'+':'-'}${item.price.toLocaleString()} ฿
                        </span>
                    </div>`;
            }
        });

        Object.entries(expenseMap).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([name, val]) => {
            spendDiv.innerHTML += `
                <div class="spending-item">
                    <span>${name}</span>
                    <b style="color:var(--red)">-${val.toLocaleString()} ฿</b>
                </div>`;
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.3;">ไม่มีรายการจ้ะ</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไร'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#81e6e2', '#f28d8d', '#5c85d6'],
                    borderWidth: 8,
                    borderColor: 'rgba(255,255,255,0.8)',
                    hoverOffset: 15
                }]
            },
            options: { cutout: '70%', plugins: { legend: { display: false } } }
        });
    }

    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
