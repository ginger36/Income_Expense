<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Elegant Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #0abab5;
    --navy: #002d5e;
    --soft-pink: #fbc2eb;
    --soft-yellow: #fef9e7;
    --white: rgba(255, 255, 255, 0.9);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    /* พื้นหลังเบนสีแบบฟุ้งๆ มีสีสัน */
    background: 
        radial-gradient(at 0% 0%, #e0f7f6 0px, transparent 50%),
        radial-gradient(at 50% 0%, #fbc2eb 0px, transparent 50%),
        radial-gradient(at 100% 0%, #a6c1ee 0px, transparent 50%),
        radial-gradient(at 0% 100%, #fef9e7 0px, transparent 50%),
        radial-gradient(at 100% 100%, #e0f2f1 0px, transparent 50%);
    background-color: #fdfbfb;
    background-attachment: fixed;
    position: relative;
    color: var(--navy);
}

/* อิโมจิฟุ้งๆ */
.bg-emoji {
    position: fixed;
    z-index: -1;
    opacity: 0.4;
    filter: blur(0.5px);
    animation: floatEmoji 12s linear infinite;
}

@keyframes floatEmoji {
    0% { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-15vh) rotate(360deg); }
}

.container {
    max-width: 500px;
    width: 92%;
    padding: 40px 0 100px;
}

/* หัวข้อและโลโก้ */
.header-section { margin-bottom: 30px; text-align: center; }
.logo {
    width: 115px; height: 115px;
    border-radius: 50%;
    margin: 0 auto 20px;
    border: 4px solid #fff;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
}
.logo img { width: 100%; height: 100%; object-fit: cover; }

h1 { font-weight: 500; font-size: 32px; margin-bottom: 5px; color: var(--navy); }
.subtitle { font-weight: 300; font-size: 14px; opacity: 0.7; color: var(--navy); }

/* สไตล์กล่องข้อความ แกรม มินิมอล */
.section {
    background: var(--white);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 35px;
    padding: 25px;
    margin-bottom: 25px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

h2 { font-size: 18px; font-weight: 500; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

/* Input */
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full-width { grid-column: span 2; }

input, select {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 12px 15px;
    border-radius: 18px;
    outline: none;
    font-size: 14px;
    color: var(--navy);
}
input:focus { border-color: var(--tiffany); background: #fff; }

/* ปุ่มหลัก */
.btn-main {
    width: 100%;
    background: linear-gradient(135deg, var(--navy), #0056b3);
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 500;
    margin-top: 15px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,45,94,0.2);
    transition: 0.3s;
}
.btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(0,45,94,0.3); }

/* สถิติ */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.stat-box {
    background: rgba(255,255,255,0.8);
    padding: 18px;
    border-radius: 25px;
    text-align: center;
    border: 1px solid rgba(255,255,255,1);
}
.stat-label { font-size: 12px; opacity: 0.6; display: block; margin-bottom: 5px; }
.stat-value { font-size: 18px; font-weight: 500; }

.result-row {
    display: flex; justify-content: space-between; padding: 15px 20px;
    border-radius: 20px; margin-bottom: 10px; font-size: 14px;
}
.row-income { background: #e0f2f1; color: #00796b; }
.row-expense { background: #ffebee; color: #c62828; }
.row-profit { background: var(--navy); color: #fff; margin-top: 10px; }

/* รายการ */
.item-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 5px; border-bottom: 1px solid rgba(0,0,0,0.05);
}
.item-card:last-child { border: none; }
.item-info b { font-weight: 500; color: var(--navy); }
.item-info small { display: block; font-size: 11px; opacity: 0.5; }

.chart-container { margin: 10px auto; max-width: 220px; }

.footer-text { text-align: center; font-size: 11px; opacity: 0.4; margin-top: 40px; }
</style>
</head>
<body>

<div id="emoji-container"></div>

<div class="container">
    <div class="header-section">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
        </div>
        <h1>nongsorin</h1>
        <p class="subtitle">บันทึกกำไรและความสุขในทุกวัน 🌸</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">กำไรเดือนนี้</span>
                <span id="badge-month" class="stat-value">0 ฿</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">ยอดรวมรายปี</span>
                <span id="badge-year" class="stat-value" style="color: var(--tiffany);">0 ฿</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>📝 เพิ่มรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="เช่น ขายขนม, ซื้อของ..." class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน (บาท)">
            <input type="number" id="price" placeholder="ราคาขาย (บาท)">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกข้อมูล ✨</button>
    </div>

    <div class="section">
        <h2>📊 สรุปยอดเงิน</h2>
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
        <div class="result-row row-income">
            <span>รายรับทั้งหมด</span>
            <span id="sumIn">0 ฿</span>
        </div>
        <div class="result-row row-expense">
            <span>รายจ่ายทั้งหมด</span>
            <span id="sumOut">0 ฿</span>
        </div>
        <div class="result-row row-profit">
            <span style="font-weight: 300;">กำไรสุทธิ</span>
            <span id="sumNet" style="font-size: 18px; font-weight: 500;">0 ฿</span>
        </div>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2 style="margin:0;">📅 ประวัติรายการ</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 5px; border-radius: 12px; font-size: 12px;">
                <option value="all">ทุกเดือน</option>
                <option value="0">มกราคม</option><option value="1">กุมภาพันธ์</option>
                <option value="2">มีนาคม</option><option value="3">เมษายน</option>
                <option value="4">พฤษภาคม</option><option value="5">มิถุนายน</option>
                <option value="6">กรกฎาคม</option><option value="7">สิงหาคม</option>
                <option value="8">กันยายน</option><option value="9">ตุลาคม</option>
                <option value="10">พฤศจิกายน</option><option value="11">ธันวาคม</option>
            </select>
        </div>
        <div id="displayList"></div>
        <p onclick="clearData()" style="text-align:center; font-size:10px; color:#bbb; margin-top:25px; cursor:pointer; text-decoration: underline;">ล้างข้อมูลบันทึกทั้งหมด</p>
    </div>

    <p class="footer-text">© 2026 NONGSORIN • บันทึกกำไรดิจิทัล</p>
</div>

<script>
    // สุ่มอิโมจิพื้นหลัง
    const emojis = ['🦋', '🪼', '🐳', '🐠', 'Ⓜ️'];
    function createEmoji() {
        const e = document.createElement('div');
        e.className = 'bg-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 20 + 20) + 'px';
        e.style.animationDuration = (Math.random() * 8 + 8) + 's';
        document.getElementById('emoji-container').appendChild(e);
        setTimeout(() => e.remove(), 12000);
    }
    setInterval(createEmoji, 2500);

    let transactions = JSON.parse(localStorage.getItem('glam_tracker_data')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date) return alert('กรุณากรอกชื่อรายการและวันที่ด้วยนะคะ 🌸');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('glam_tracker_data', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';
        let tIn = 0, tOut = 0, yNet = 0;
        const currYear = new Date().getFullYear();

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;
            const profit = item.type === 'income' ? (item.price - item.cost) : -item.cost;

            if(d.getFullYear() === currYear) yNet += profit;

            if(isMatch) {
                if(item.type === 'income') tIn += item.price;
                else tOut += item.cost;

                listDiv.innerHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <b>${item.desc}</b>
                            <small>${d.toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</small>
                        </div>
                        <div style="text-align:right; font-weight:500; color:${profit>=0?'#00796b':'#d32f2f'}">
                            ${profit.toLocaleString()} ฿
                        </div>
                    </div>`;
            }
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-month').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-year').innerText = yNet.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; opacity:0.3; font-size:12px; padding:15px;">ยังไม่มีข้อมูลบันทึก</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไรสุทธิ'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#0abab5', '#ff8a80', '#002d5e'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function clearData() { if(confirm('ต้องการลบข้อมูลบันทึกทั้งหมดใช่ไหม?')) { transactions = []; localStorage.clear(); calculateSummary(); } }
    
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
