<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Ultra Tracker ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #81e6e2;  
    --navy: #5c85d6;     
    --red: #f28d8d;      
    --dark-navy: #3d5a94;
    --glass: rgba(255, 255, 255, 0.75);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: linear-gradient(135deg, #e0f2f1 0%, #e8eaf6 50%, #fce4ec 100%);
    background-attachment: fixed;
    color: #333;
    overflow-x: hidden;
}

/* --- อิโมจิพื้นหลัง ลอยนิ่งๆ --- */
#bg-emojis {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none;
}
.float-bg {
    position: absolute;
    opacity: 0.25;
    animation: gentleFloat 6s ease-in-out infinite alternate;
}
@keyframes gentleFloat {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-25px) rotate(10deg); }
}

.container { max-width: 500px; width: 92%; padding: 40px 0 100px; position: relative; z-index: 1; }

/* --- ส่วนโลโก้ แสงฟุ้งออร่า --- */
.header-section { margin-bottom: 50px; text-align: center; position: relative; }
.logo-container {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto;
}
.logo-glow {
    width: 110px; height: 110px;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 45px 12px var(--tiffany), 0 0 75px 22px rgba(92, 133, 214, 0.35);
    background: #fff;
    z-index: 5;
    overflow: hidden;
}
.logo-glow img { width: 100%; height: 100%; object-fit: cover; }

.orbit {
    position: absolute;
    font-size: 28px;
    z-index: 6;
    animation: orbitGentle 4s ease-in-out infinite alternate;
}
@keyframes orbitGentle { from { transform: translateY(0); } to { transform: translateY(-12px); } }
.e1 { top: 10%; left: 5%; }
.e2 { top: 10%; right: 5%; animation-delay: 0.5s; }
.e3 { bottom: 15%; left: 0%; animation-delay: 1s; }
.e4 { bottom: 15%; right: 0%; animation-delay: 1.5s; }

/* --- บล็อก Glassmorphism --- */
.section {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-radius: 35px;
    padding: 28px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    border: 1px solid rgba(255, 255, 255, 0.6);
}

h2 { font-size: 18px; color: var(--dark-navy); margin-bottom: 20px; font-weight: 500; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full-width { grid-column: span 2; }

input, select {
    background: rgba(255, 255, 255, 0.9);
    border: 1.5px solid #eee;
    padding: 12px;
    border-radius: 15px;
    outline: none; font-size: 14px;
}

.btn-main {
    width: 100%;
    background: linear-gradient(45deg, var(--tiffany), var(--navy), var(--dark-navy));
    background-size: 200% auto;
    color: #fff; border: none; padding: 16px; border-radius: 20px;
    font-size: 16px; font-weight: 500; margin-top: 15px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(92, 133, 214, 0.25);
    transition: 0.4s ease;
}
.btn-main:hover { background-position: right center; transform: translateY(-2px); }

/* ปุ่มเสริม */
.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-sub {
    flex: 1; padding: 12px; border-radius: 15px; border: none; 
    font-size: 13px; cursor: pointer; transition: 0.3s;
}
.btn-export { background: #e8eaf6; color: var(--navy); }
.btn-clear { background: #fff1f1; color: #e57373; }
.btn-sub:hover { opacity: 0.8; transform: scale(1.02); }

/* --- ผลลัพธ์สรุปยอด --- */
.res-box {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 22px; border-radius: 20px; margin-bottom: 10px;
    font-size: 15px; font-weight: 400;
}
.res-in { background: #e0f2f1; color: #00796b; border-left: 5px solid var(--tiffany); }
.res-cost { background: #fff3e0; color: #ef6c00; border-left: 5px solid #ffcc80; }
.res-out { background: #ffebee; color: #c62828; border-left: 5px solid var(--red); }
.res-net { 
    background: linear-gradient(135deg, var(--navy), var(--dark-navy)); 
    color: #fff; font-size: 18px; font-weight: 500;
}

.spending-detail {
    margin-top: 25px; background: rgba(255,255,255,0.4);
    border-radius: 20px; padding: 18px;
}
.spending-item {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px;
}

.footer-text { text-align: center; font-size: 11px; color: #999; margin-top: 50px; opacity: 0.7; }
</style>
</head>
<body>

<div id="bg-emojis"></div>

<div class="container">
    <div class="header-section">
        <div class="logo-container">
            <span class="orbit e1">🐳</span>
            <span class="orbit e2">🐠</span>
            <span class="orbit e3">🦋</span>
            <span class="orbit e4">🪼</span>
            <div class="logo-glow">
                <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
            </div>
        </div>
        <h1 style="color: var(--dark-navy); font-size: 32px; margin-top: 12px; font-weight: 500;">nongsorin</h1>
        <p style="opacity: 0.5; font-size: 13px;">Wealthy & Aesthetics Dashboard ✨</p>
    </div>

    <div class="section">
        <h2>✨ เพิ่มรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="รายการนี้คืออะไรคะ?" class="full-width">
            <select id="type">
                <option value="income">รายรับ (ยอดขาย)</option>
                <option value="expense">รายจ่าย (ค่าใช้จ่าย)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน (฿)">
            <input type="number" id="price" placeholder="ราคาขาย/จ่าย (฿)">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกข้อมูลแบบเริดๆ 💎</button>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 22px;">
            <h2>📊 บทสรุปกำไร</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 6px; border-radius: 10px; border: 1px solid #eee; font-size: 12px;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>

        <div style="max-width: 210px; margin: 0 auto 25px;">
            <canvas id="profitChart"></canvas>
        </div>

        <div class="res-box res-in"><span>ยอดขายรวม</span><span id="sumIn">0 ฿</span></div>
        <div class="res-box res-cost"><span>ต้นทุนสินค้า</span><span id="sumCost">0 ฿</span></div>
        <div class="res-box res-out"><span>รายจ่ายอื่น</span><span id="sumOut">0 ฿</span></div>
        <div class="res-box res-net"><span>กำไรสุทธิ</span><span id="sumNet">0 ฿</span></div>

        <div class="spending-detail">
            <p style="font-size: 14px; font-weight: 500; color: var(--dark-navy); margin-bottom: 10px;">💸 รายจ่ายสะสม</p>
            <div id="spendList"></div>
        </div>
    </div>

    <div class="section">
        <h2>📅 ประวัติรายการ</h2>
        <div id="displayList"></div>
        
        <div class="btn-group">
            <button onclick="exportCSV()" class="btn-sub btn-export">📂 ส่งออกไฟล์ CSV</button>
            <button onclick="clearAllData()" class="btn-sub btn-clear">🗑️ ล้างข้อมูลทั้งหมด</button>
        </div>
    </div>

    <p class="footer-text">CREATED BY NONGSORIN • 2026</p>
</div>

<script>
    const bgContainer = document.getElementById('bg-emojis');
    const emojis = ['🌸', '✨', '💎', '🐳', '💧', '🫧'];
    for(let i=0; i<12; i++) {
        let span = document.createElement('span');
        span.className = 'float-bg';
        span.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        span.style.left = Math.random()*100 + 'vw';
        span.style.top = Math.random()*100 + 'vh';
        span.style.fontSize = Math.random()*12 + 15 + 'px';
        span.style.animationDelay = Math.random()*5 + 's';
        bgContainer.appendChild(span);
    }

    let transactions = JSON.parse(localStorage.getItem('sorin_profit_v2')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date || price <= 0) return alert('กรอกข้อมูลให้ครบก่อนนะคะ ✨');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('sorin_profit_v2', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        const spendDiv = document.getElementById('spendList');
        listDiv.innerHTML = ''; spendDiv.innerHTML = '';
        
        let tIn = 0, tCost = 0, tOtherOut = 0;
        let expenseMap = {};

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;

            if(isMatch) {
                if(item.type === 'income') {
                    tIn += item.price;
                    tCost += item.cost;
                } else {
                    tOtherOut += item.price;
                    expenseMap[item.desc] = (expenseMap[item.desc] || 0) + item.price;
                }

                listDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.03);">
                        <span><b>${item.desc}</b><br><small style="color:#aaa">${item.date} | ทุน: ${item.cost}</small></span>
                        <span style="color:${item.type==='income'?'#00796b':'#e57373'}; font-weight:500;">
                            ${item.type==='income'?'+':'-'}${item.price.toLocaleString()}
                        </span>
                    </div>`;
            }
        });

        Object.entries(expenseMap).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([name, val]) => {
            spendDiv.innerHTML += `<div class="spending-item"><span>${name}</span><b>-${val.toLocaleString()} ฿</b></div>`;
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumCost').innerText = tCost.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOtherOut.toLocaleString() + ' ฿';
        const net = tIn - (tCost + tOtherOut);
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        
        updateChart(tIn, tCost, tOtherOut);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">ไม่มีข้อมูล</p>';
    }

    function updateChart(inc, cst, out) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['ยอดขาย', 'ต้นทุน', 'จ่ายอื่น'],
                datasets: [{
                    data: [inc, cst, out],
                    backgroundColor: ['#81e6e2', '#ffcc80', '#f28d8d'],
                    borderWidth: 5,
                    borderColor: 'rgba(255,255,255,0.6)',
                    hoverOffset: 10
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    // ฟังก์ชันใหม่: ส่งออกข้อมูลเป็น CSV
    function exportCSV() {
        if(transactions.length === 0) return alert('ไม่มีข้อมูลให้ส่งออกค่ะ');
        
        let csvContent = "\uFEFF"; // รองรับภาษาไทยใน Excel
        csvContent += "วันที่,รายการ,ประเภท,ต้นทุน,ยอดเงิน\n";
        
        transactions.forEach(t => {
            csvContent += `${t.date},${t.desc},${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'},${t.cost},${t.price}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `nongsorin_report_${new Date().toLocaleDateString()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // ฟังก์ชันใหม่: ล้างข้อมูลทั้งหมด
    function clearAllData() {
        if(confirm('คุณแน่ใจนะคะว่าจะล้างข้อมูลทั้งหมด? ข้อมูลจะหายถาวรเลยน้า ✨')) {
            transactions = [];
            localStorage.removeItem('sorin_profit_v2');
            calculateSummary();
            alert('ล้างข้อมูลเรียบร้อยแล้วค่ะ!');
        }
    }

    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
