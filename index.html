<<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Digital Profit Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #0abab5;
    --navy: #004080;
    --red: #e63946;
    --white: #ffffff;
    --glass: rgba(255, 255, 255, 0.92);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    /* พื้นหลังลาย Gradient เคลื่อนไหว */
    background: linear-gradient(-45deg, #e6fffa, #fdfbfb, #ebf8ff, #fff5f5);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 550px;
    width: 100%;
    padding: 30px 15px 80px;
    text-align: center;
}

/* ส่วนหัว */
.header-section { margin-bottom: 30px; }
.logo {
    width: 120px; height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 15px;
    border: 4px solid var(--white);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}
.logo:hover { transform: scale(1.05); }
.logo img { width: 100%; height: 100%; object-fit: cover; }

h1 { color: var(--navy); font-size: 32px; margin-bottom: 5px; }
.subtitle { color: var(--tiffany); font-size: 15px; margin-bottom: 20px; font-weight: 400; }

/* Card Styling */
.section {
    background: var(--glass);
    border-radius: 28px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
}

h2 { color: var(--navy); font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* Input Styling */
.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.full-width { grid-column: span 2; }
input, select {
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    border: 1.5px solid #eee;
    background: #fff;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}
input:focus, select:focus { border-color: var(--tiffany); box-shadow: 0 0 10px rgba(10,186,181,0.2); }

/* Buttons */
.btn {
    width: 100%;
    padding: 15px;
    border-radius: 18px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-size: 16px;
    transition: 0.3s;
}
.btn-main { background: var(--tiffany); color: white; margin-top: 15px; box-shadow: 0 5px 15px rgba(10,186,181,0.3); }
.btn-main:hover { background: #089692; transform: translateY(-2px); }
.btn-outline { background: transparent; border: 2px dashed var(--navy); color: var(--navy); margin-bottom: 20px; }

/* Statistics */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-box {
    background: white; padding: 15px; border-radius: 20px; border: 1px solid #f0f0f0;
}
.stat-label { font-size: 12px; color: #888; display: block; }
.stat-value { font-size: 16px; font-weight: 600; color: var(--navy); }

/* สรุปยอดเงินแบบแถบสี */
.result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 20px; border-radius: 18px; margin-bottom: 10px;
}
.row-income { background: #e6fffa; color: #2d6a4f; border: 1px solid #b7e4c7; }
.row-expense { background: #fff5f5; color: var(--red); border: 1px solid #feb2b2; }
.row-profit { background: var(--navy); color: white; margin-top: 15px; }

/* รายการบันทึก */
#displayList { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
.item-card {
    background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
    text-align: left; border: 1px solid #f5f5f5;
}
.item-card:hover { background: #fafafa; }

/* Graph */
.chart-container { margin: 20px auto; max-width: 250px; }

.footer-text { color: var(--navy); opacity: 0.5; font-size: 12px; margin-top: 30px; }
</style>
</head>

<body>

<div class="container">

    <div class="header-section">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="nongsorin logo">
        </div>
        <h1>nongsorin</h1>
        <p class="subtitle">บันทึกกำไรดีๆ มีความสุขทุกการใช้จ่าย 🌸</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">กำไรเดือนนี้</span>
                <span id="badge-month" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">รวมทั้งปี 2026</span>
                <span id="badge-year" class="stat-value" style="color: var(--tiffany);">0</span>
            </div>
        </div>
        
        <button onclick="calculateSummary()" class="btn btn-outline">🔄 อัปเดตข้อมูลสรุปยอดเงิน</button>
    </div>

    <div class="section">
        <h2>📝 เพิ่มรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="ชื่อรายการ (เช่น ขายเค้ก, ซื้อวัตถุดิบ)" class="full-width">
            <select id="type">
                <option value="income">➕ รายรับ</option>
                <option value="expense">➖ รายจ่าย</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน (บาท)">
            <input type="number" id="price" placeholder="ราคาขาย (บาท)">
        </div>
        <button onclick="addItem()" class="btn btn-main">บันทึกข้อมูล ✨</button>
    </div>

    <div class="section">
        <h2>📊 สัดส่วนทางการเงิน</h2>
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
        <div class="result-row row-income">
            <span>รายรับรวม</span>
            <span id="sumIn" style="font-weight: 600;">0 ฿</span>
        </div>
        <div class="result-row row-expense">
            <span>รายจ่ายรวม</span>
            <span id="sumOut" style="font-weight: 600;">0 ฿</span>
        </div>
        <div class="result-row row-profit">
            <span style="font-weight: 300;">กำไรสุทธิ</span>
            <span id="sumNet" style="font-weight: 600; font-size: 20px;">0 ฿</span>
        </div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">📅 ประวัติรายการ</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="width: auto; padding: 8px;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        
        <div id="displayList">
            </div>

        <button onclick="clearData()" style="background: none; border: none; color: #bbb; font-size: 11px; margin-top: 20px; cursor: pointer; text-decoration: underline;">ล้างข้อมูลทั้งหมด</button>
    </div>

    <p class="footer-text">© 2026 nongsorin - Digital Profit Journal</p>

</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('nongsorin_biz_data')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date) {
            alert('กรุณากรอกชื่อรายการและวันที่ให้ครบถ้วนนะคะ 🥺');
            return;
        }

        // หากเป็นรายรับ กำไร = ราคาขาย - ต้นทุน | หากเป็นรายจ่าย ยอดรวมคือต้นทุน
        const finalAmount = type === 'income' ? price : cost;

        transactions.push({ desc, type, date, cost, price, finalAmount });
        localStorage.setItem('nongsorin_biz_data', JSON.stringify(transactions));
        
        // Reset Inputs
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';

        let totalIn = 0;
        let totalOut = 0;
        let yearTotal = 0;
        const currentYear = new Date().getFullYear();

        // เรียงลำดับวันที่ล่าสุดขึ้นก่อน
        const sortedData = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

        sortedData.forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;
            
            // คำนวณรายปี
            if(d.getFullYear() === currentYear) {
                yearTotal += (item.type === 'income' ? (item.price - item.cost) : -item.cost);
            }

            if(isMatch) {
                if(item.type === 'income') totalIn += item.price;
                else totalOut += item.cost;

                const profit = item.type === 'income' ? (item.price - item.cost) : -item.cost;
                const profitColor = profit >= 0 ? '#0abab5' : '#e63946';

                listDiv.innerHTML += `
                    <div class="item-card" style="border-left: 5px solid ${item.type === 'income' ? '#0abab5' : '#e63946'}">
                        <div>
                            <div style="font-weight:500;">${item.desc}</div>
                            <div style="font-size:11px; color:#999;">${d.toLocaleDateString('th-TH')}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="color:${profitColor}; font-weight:600;">${profit.toLocaleString()} ฿</div>
                            <div style="font-size:10px; color:#bbb;">ทุน: ${item.cost} | ขาย: ${item.price}</div>
                        </div>
                    </div>
                `;
            }
        });

        // Update Text
        document.getElementById('sumIn').innerText = totalIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = totalOut.toLocaleString() + ' ฿';
        const net = totalIn - totalOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-month').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-year').innerText = yearTotal.toLocaleString() + ' ฿';

        updateChart(totalIn, totalOut, net);
        if(listDiv.innerHTML === '') listDiv.innerHTML = '<p style="color:#ccc; padding:20px;">ไม่มีข้อมูลรายการ</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        const data = {
            labels: ['รายรับ', 'รายจ่าย', 'กำไรสุทธิ'],
            datasets: [{
                data: [inc, out, net > 0 ? net : 0],
                backgroundColor: ['#0abab5', '#e63946', '#004080'],
                borderWidth: 0
            }]
        };

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: data,
            options: {
                plugins: { legend: { display: false } },
                cutout: '70%'
            }
        });
    }

    function clearData() {
        if(confirm('ลบข้อมูลทั้งหมดและเริ่มใหม่ใช่ไหมคะ?')) {
            transactions = [];
            localStorage.removeItem('nongsorin_biz_data');
            calculateSummary();
        }
    }

    // Set Default Date
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
