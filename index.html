<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Harmonious Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    /* ปรับเฉดสีให้มีความนวลและน้ำหนักสีใกล้เคียงกัน */
    --tiffany: #81e6e2;  /* Tiffany แบบนุ่มนวล */
    --navy: #5c85d6;     /* น้ำเงิน Denim ที่ดูไม่หนักเกินไป */
    --red: #f28d8d;      /* แดงกุหลาบอ่อนๆ */
    --text: #4a5568;
    --bg-white: rgba(255, 255, 255, 0.8);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    /* พื้นหลังเบนสีแบบกลมกลืนเป็นเนื้อเดียว */
    background: linear-gradient(135deg, #fdfcfb 0%, #e2ebf0 50%, #fef9e7 100%);
    background-attachment: fixed;
    color: var(--text);
}

/* อิโมจิแบบโปร่งแสงเพื่อให้ดูไม่กระโดด */
.bg-emoji {
    position: fixed;
    z-index: -1;
    opacity: 0.2;
    filter: grayscale(30%);
    animation: floatEmoji 15s linear infinite;
}

@keyframes floatEmoji {
    0% { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
}

.container {
    max-width: 500px;
    width: 92%;
    padding: 40px 0 100px;
}

.header-section { margin-bottom: 30px; text-align: center; }
.logo {
    width: 95px; height: 95px;
    border-radius: 50%;
    margin: 0 auto 15px;
    border: 5px solid #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}
.logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

h1 { font-weight: 500; font-size: 30px; color: var(--navy); opacity: 0.9; }
.subtitle { font-weight: 300; font-size: 14px; color: #718096; }

/* กล่อง UI แบบนุ่มนวล */
.section {
    background: var(--bg-white);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 25px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 15px 35px rgba(92, 133, 214, 0.05);
}

h2 { font-size: 17px; font-weight: 500; margin-bottom: 20px; color: var(--navy); display: flex; align-items: center; gap: 10px; }

/* Input สไตล์ละมุน */
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full-width { grid-column: span 2; }

input, select {
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid #e2e8f0;
    padding: 12px;
    border-radius: 15px;
    outline: none;
    font-size: 14px;
    color: var(--text);
    transition: all 0.3s ease;
}
input:focus { border-color: var(--tiffany); background: #fff; }

/* ปุ่มที่สีกลมกลืน */
.btn-main {
    width: 100%;
    background: linear-gradient(135deg, var(--navy), var(--tiffany));
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 400;
    margin-top: 15px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(92, 133, 214, 0.2);
    transition: 0.3s;
}
.btn-main:hover { opacity: 0.9; transform: translateY(-1px); }

/* สถิติแบบคุมโทน */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.stat-box {
    background: #fff;
    padding: 18px;
    border-radius: 22px;
    text-align: center;
    border-bottom: 3px solid transparent;
}
.stat-label { font-size: 11px; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 18px; font-weight: 500; margin-top: 5px; }

.result-row {
    display: flex; justify-content: space-between; padding: 15px 20px;
    border-radius: 20px; margin-bottom: 12px; font-size: 14px;
}
.row-income { background: #f0fff4; color: #48bb78; } /* เขียวมินต์อ่อนเข้ากับ Tiffany */
.row-expense { background: #fff5f5; color: #f56565; } /* แดงระเรื่อ */
.row-profit { background: var(--navy); color: #fff; box-shadow: 0 10px 20px rgba(92, 133, 214, 0.15); }

/* ประวัติรายการ */
.item-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 5px; border-bottom: 1px solid #edf2f7;
}
.item-card:last-child { border: none; }
.item-info b { font-weight: 500; color: #4a5568; }
.item-info small { display: block; font-size: 11px; color: #a0aec0; margin-top: 2px; }

.chart-container { margin: 10px auto 20px; max-width: 190px; }

.footer-text { text-align: center; font-size: 11px; color: #cbd5e0; margin-top: 40px; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="emoji-container"></div>

<div class="container">
    <div class="header-section">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
        </div>
        <h1>nongsorin</h1>
        <p class="subtitle">บันทึกรายรับรายจ่ายในแบบที่สบายตา ✨</p>
        
        <div class="stats-grid">
            <div class="stat-box" style="border-color: var(--tiffany);">
                <span class="stat-label">กำไรเดือนนี้</span>
                <span id="badge-month" class="stat-value">0 ฿</span>
            </div>
            <div class="stat-box" style="border-color: var(--navy);">
                <span class="stat-label">รวมปี 2026</span>
                <span id="badge-year" class="stat-value">0 ฿</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>📝 เพิ่มรายการเงิน</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="เช่น ค่ากาแฟ, ขายของได้..." class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ยอดเงิน">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกรายการ 🌸</button>
    </div>

    <div class="section">
        <h2>📊 สรุปยอด</h2>
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
        <div class="result-row row-income">
            <span>รายรับรวม</span>
            <span id="sumIn">0 ฿</span>
        </div>
        <div class="result-row row-expense">
            <span>รายจ่ายรวม</span>
            <span id="sumOut">0 ฿</span>
        </div>
        <div class="result-row row-profit">
            <span style="font-weight: 300;">กำไรสุทธิ</span>
            <span id="sumNet" style="font-size: 18px; font-weight: 500;">0 ฿</span>
        </div>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="margin:0;">📅 รายการย้อนหลัง</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 5px 10px; border-radius: 12px; font-size: 12px;">
                <option value="all">ทุกเดือน</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        <div id="displayList"></div>
        <p onclick="clearData()" style="text-align:center; font-size:10px; color:#cbd5e0; margin-top:30px; cursor:pointer; text-decoration: underline;">รีเซ็ตข้อมูลทั้งหมด</p>
    </div>

    <p class="footer-text">CREATED BY NONGSORIN • 2026</p>
</div>

<script>
    const emojis = ['🌸', '🐳', '✨', '💧'];
    function createEmoji() {
        const e = document.createElement('div');
        e.className = 'bg-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 20 + 15) + 'px';
        e.style.animationDuration = (Math.random() * 10 + 10) + 's';
        document.getElementById('emoji-container').appendChild(e);
        setTimeout(() => e.remove(), 15000);
    }
    setInterval(createEmoji, 4000);

    let transactions = JSON.parse(localStorage.getItem('harmonious_tracker_v1')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date) return alert('รบกวนกรอกรายละเอียดก่อนบันทึกนะคะ ✨');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('harmonious_tracker_v1', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';
        let tIn = 0, tOut = 0, yNet = 0;
        const currYear = new Date().getFullYear();

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;
            const profit = item.type === 'income' ? (item.price - item.cost) : -item.cost;

            if(d.getFullYear() === currYear) yNet += profit;

            if(isMatch) {
                if(item.type === 'income') tIn += item.price;
                else tOut += item.cost;

                listDiv.innerHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <b>${item.desc}</b>
                            <small>${d.toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</small>
                        </div>
                        <div style="text-align:right; font-weight:500; color:${profit>=0?'#48bb78':'#f56565'}">
                            ${profit > 0 ? '+' : ''}${profit.toLocaleString()} ฿
                        </div>
                    </div>`;
            }
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-month').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-year').innerText = yNet.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">ไม่มีรายการบันทึกจ้ะ</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไรสุทธิ'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#81e6e2', '#f28d8d', '#5c85d6'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function clearData() { if(confirm('ต้องการลบข้อมูลทั้งหมดใช่ไหมคะ?')) { transactions = []; localStorage.clear(); calculateSummary(); } }
    
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
