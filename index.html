<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Financial Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #0abab5;
    --navy: #004080;
    --red: #e63946;
    --white: #ffffff;
    --glass: rgba(255, 255, 255, 0.95);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    /* พื้นหลังเฉดสีอ่อนลงตามคำขอ */
    background: linear-gradient(135deg, #eef2f3 0%, #e0f7f6 40%, #f9ecec 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    color: #333;
}

.container {
    max-width: 500px;
    width: 100%;
    padding: 20px 15px 60px;
}

.section {
    background: var(--glass);
    border-radius: 28px;
    padding: 22px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.8);
}

h1 { color: var(--navy); font-size: 28px; margin-bottom: 5px; }
h2 { color: var(--navy); font-size: 17px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.center { text-align: center; }

/* โลโก้ */
.logo {
    width: 100px; height: 100px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 3px solid var(--white);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.logo img { width: 100%; height: 100%; object-fit: cover; }

/* Badges */
.badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 15px;
}
.badge {
    background: var(--white);
    padding: 5px 12px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--navy);
    border: 1px solid #eee;
    font-weight: 500;
}

/* แสงกะพริบที่ปุ่มอัปเดต */
@keyframes pulse-glow {
    0% { box-shadow: 0 0 0 0 rgba(10, 186, 181, 0.4); }
    70% { box-shadow: 0 0 0 12px rgba(10, 186, 181, 0); }
    100% { box-shadow: 0 0 0 0 rgba(10, 186, 181, 0); }
}

.btn-glow {
    animation: pulse-glow 2s infinite;
    background: var(--tiffany);
    color: white;
    border: 2px dashed rgba(255,255,255,0.5);
}

/* UI Input */
.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid #eee;
    outline: none;
    font-size: 14px;
    background: #fafafa;
}
input:focus { border-color: var(--tiffany); background: #fff; }

.btn {
    display: block; width: 100%;
    text-align: center; padding: 14px;
    border-radius: 15px; font-weight: 500;
    cursor: pointer; border: none; transition: 0.3s;
}
.btn-main { background: var(--navy); color: white; }
.btn-accent { background: var(--red); color: white; }

/* กราฟ */
.chart-container {
    width: 100%;
    height: 200px;
    margin-bottom: 10px;
}

/* รายการบันทึก */
#displayList { margin-top: 10px; max-height: 250px; overflow-y: auto; }
.item-card {
    background: #fff; padding: 12px; border-radius: 15px;
    margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
    border: 1px solid #f0f0f0;
}
.btn-delete {
    color: #ccc; cursor: pointer; padding: 5px; font-size: 14px;
}
.btn-delete:hover { color: var(--red); }

/* สรุปยอด */
.price-row {
    display: flex; justify-content: space-between;
    margin-bottom: 8px; background: #fdfdfd;
    padding: 10px 15px; border-radius: 12px;
    border: 1px solid #f5f5f5;
}

.footer { text-align: center; color: #999; font-size: 11px; margin-top: 20px; }
</style>
</head>

<body>
<div class="container">

    <div class="center" style="margin-bottom: 25px;">
        <div class="logo">
            <img src="https://via.placeholder.com/150" alt="logo">
        </div>
        <h1>nongsorin</h1>
        <div class="badges">
            <div class="badge" id="badge-profit">กำไรเดือนนี้: 0</div>
            <div class="badge" id="badge-year">ยอดขายปีนี้: 0</div>
        </div>
        <button onclick="updateAll()" class="btn btn-glow" style="padding: 10px 20px; border-radius: 20px; font-size: 14px;">
            ✨ อัปเดตข้อมูลล่าสุด
        </button>
    </div>

    <div class="section">
        <h2>📊 กราฟสรุปรายเดือน</h2>
        <div class="chart-container">
            <canvas id="businessChart"></canvas>
        </div>
    </div>

    <div class="section">
        <h2>✍️ บันทึกรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="รายการ" style="grid-column: span 2;">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ราคาขาย">
            <input type="date" id="date" style="grid-column: span 2;">
        </div>
        <button onclick="addItem()" class="btn btn-main">บันทึกข้อมูล</button>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">📅 ประวัติรายการ</h2>
            <select id="filterMonth" onchange="updateAll()" style="border:none; background:none; font-size:13px; color:var(--navy); font-weight:500;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        <div id="displayList"></div>
    </div>

    <div class="section" style="border-top: 5px solid var(--tiffany);">
        <h2>💰 สรุปตัวเลขสุทธิ</h2>
        <div class="price-row">
            <span>ยอดขายรวม</span>
            <span id="totalSales" style="color:var(--navy); font-weight:600;">0</span>
        </div>
        <div class="price-row">
            <span>ต้นทุนรวม</span>
            <span id="totalCost" style="color:var(--red); font-weight:600;">0</span>
        </div>
        <div class="price-row" style="background: var(--navy); color: white;">
            <span>กำไรสุทธิคงเหลือ</span>
            <span id="netProfit" style="font-weight: 600; font-size: 18px;">0</span>
        </div>
        <button class="btn btn-accent" style="margin-top: 15px;" onclick="exportCSV()">📥 ดาวน์โหลดรายงาน CSV</button>
        <button onclick="clearData()" style="background:none; border:none; color:#ccc; font-size:10px; width:100%; margin-top:15px; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
    </div>

    <div class="footer">
        © 2026 nongsorin - Financial Dashboard Pro
    </div>

</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('nongsorin_v3')) || [];
    let myChart;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const date = document.getElementById('date').value;

        if(!desc || !date) return alert('กรุณากรอกข้อมูลให้ครบค่ะ');

        transactions.push({ id: Date.now(), desc, cost, price, date });
        saveData();
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        updateAll();
    }

    function deleteItem(id) {
        if(confirm('ลบรายการนี้ใช่ไหม?')) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            updateAll();
        }
    }

    function saveData() {
        localStorage.setItem('nongsorin_v3', JSON.stringify(transactions));
    }

    function updateAll() {
        renderList();
        updateStats();
        renderChart();
    }

    function renderList() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';

        const filtered = transactions.filter(t => filter === 'all' || new Date(t.date).getMonth().toString() === filter);
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const profit = item.price - item.cost;
            listDiv.innerHTML += `
                <div class="item-card">
                    <div>
                        <div style="font-weight:500; font-size:14px;">${item.desc}</div>
                        <div style="font-size:10px; color:#999;">${new Date(item.date).toLocaleDateString('th-TH')}</div>
                    </div>
                    <div style="text-align:right; display:flex; align-items:center; gap:10px;">
                        <div>
                            <div style="font-size:14px; color:var(--tiffany); font-weight:600;">${profit.toLocaleString()}</div>
                            <div style="font-size:9px; color:#bbb;">ขาย ${item.price} ทุน ${item.cost}</div>
                        </div>
                        <span class="btn-delete" onclick="deleteItem(${item.id})">✕</span>
                    </div>
                </div>
            `;
        });
    }

    function updateStats() {
        let sales = 0, costs = 0, yearSales = 0;
        const now = new Date();
        
        transactions.forEach(t => {
            const d = new Date(t.date);
            sales += t.price;
            costs += t.cost;
            if(d.getFullYear() === now.getFullYear()) yearSales += t.price;
        });

        document.getElementById('totalSales').innerText = sales.toLocaleString() + ' ฿';
        document.getElementById('totalCost').innerText = costs.toLocaleString() + ' ฿';
        document.getElementById('netProfit').innerText = (sales - costs).toLocaleString() + ' ฿';
        document.getElementById('badge-profit').innerText = 'กำไรสุทธิ: ' + (sales-costs).toLocaleString();
        document.getElementById('badge-year').innerText = 'ขายรวม ' + now.getFullYear() + ': ' + yearSales.toLocaleString();
    }

    function renderChart() {
        const ctx = document.getElementById('businessChart').getContext('2d');
        const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
        const monthlySales = new Array(12).fill(0);
        const monthlyProfit = new Array(12).fill(0);

        transactions.forEach(t => {
            const m = new Date(t.date).getMonth();
            monthlySales[m] += t.price;
            monthlyProfit[m] += (t.price - t.cost);
        });

        if(myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months,
                datasets: [
                    { label: 'ยอดขาย', data: monthlySales, backgroundColor: '#0abab5' },
                    { label: 'กำไร', data: monthlyProfit, backgroundColor: '#004080' }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { font: { size: 9 } } }, x: { ticks: { font: { size: 9 } } } }
            }
        });
    }

    function clearData() { if(confirm('ต้องการล้างข้อมูลทั้งหมด?')) { transactions = []; saveData(); updateAll(); } }

    function exportCSV() {
        let csv = 'วันที่,รายการ,ต้นทุน,ราคาขาย,กำไร\n';
        transactions.forEach(t => csv += `${t.date},${t.desc},${t.cost},${t.price},${t.price-t.cost}\n`);
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "nongsorin_report.csv";
        link.click();
    }

    document.getElementById('date').valueAsDate = new Date();
    updateAll();
</script>
</body>
</html>
