<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Balanced Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #81e6e2;  
    --navy: #5c85d6;     
    --red: #f28d8d;      
    --text: #4a5568;
    --bg-white: rgba(255, 255, 255, 0.9);
    --glow-color: rgba(129, 230, 226, 0.4); 
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: linear-gradient(135deg, #fdfcfb 0%, #eef2f3 100%);
    background-attachment: fixed;
    color: var(--text);
    overflow-x: hidden;
}

/* --- อิโมจิพื้นหลัง (ลดจำนวนและความเข้มลง) --- */
#emoji-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none;
}
.floating-emoji {
    position: absolute;
    opacity: 0.2; /* จางลง */
    animation: floatEmoji linear infinite;
}
@keyframes floatEmoji {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    20% { opacity: 0.2; }
    80% { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

.container {
    max-width: 500px;
    width: 92%;
    padding: 40px 0 100px;
}

/* --- ส่วนโลโก้และอิโมจิรอบๆ --- */
.header-section { 
    margin-bottom: 40px; 
    text-align: center; 
    position: relative; 
    padding-top: 20px;
}

.logo-container {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto;
}

.logo {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: #fff;
    box-shadow: 0 0 20px var(--glow-color);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
}
.logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

/* อิโมจิรอบโลโก้ */
.orbit {
    position: absolute;
    font-size: 22px;
    animation: bounce 3s ease-in-out infinite alternate;
}
@keyframes bounce {
    from { transform: translateY(0px); }
    to { transform: translateY(-10px); }
}

.e1 { top: -5px; left: 10px; animation-delay: 0s; }
.e2 { top: -5px; right: 10px; animation-delay: 0.5s; }
.e3 { bottom: 5px; left: 10px; animation-delay: 1s; }
.e4 { bottom: 5px; right: 10px; animation-delay: 1.5s; }

/* --- UI ส่วนเนื้อหา --- */
.section {
    background: var(--bg-white);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
}

h2 { font-size: 16px; font-weight: 500; margin-bottom: 20px; color: var(--navy); display: flex; align-items: center; gap: 8px; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.full-width { grid-column: span 2; }

input, select {
    background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; outline: none; font-size: 14px;
}

.btn-main {
    width: 100%; background: linear-gradient(135deg, var(--navy), var(--tiffany));
    color: #fff; border: none; padding: 15px; border-radius: 18px; margin-top: 15px; cursor: pointer;
}

.result-row { 
    display: flex; justify-content: space-between; padding: 15px 20px; 
    border-radius: 20px; margin-bottom: 10px; font-size: 14px; 
}
.row-income { background: #f0fff4; color: #48bb78; } 
.row-expense { background: #fff5f5; color: #f56565; } 
.row-profit { background: var(--navy); color: #fff; }

.item-card { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f7f7f7; }

.chart-container { margin: 10px auto 25px; max-width: 200px; }

.footer-text { text-align: center; font-size: 10px; color: #ccc; margin-top: 40px; }
</style>
</head>
<body>

<div id="emoji-container"></div>

<div class="container">
    <div class="header-section">
        <div class="logo-container">
            <span class="orbit e1">🐳</span>
            <span class="orbit e2">🐠</span>
            <span class="orbit e3">🦋</span>
            <span class="orbit e4">🪼</span>
            <div class="logo">
                <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="logo">
            </div>
        </div>
        <h1 style="margin-top: 15px;">nongsorin</h1>
        <p style="font-size: 12px; opacity: 0.6;">บันทึกยอดเงินแบบสมดุล 🌿</p>
    </div>

    <div class="section">
        <h2>📝 เพิ่มรายการเงิน</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="ค่ากาแฟ, เงินเดือน..." class="full-width">
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ยอดเงิน">
        </div>
        <button onclick="addItem()" class="btn-main">บันทึกรายการ ✨</button>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">📊 สรุปภาพรวม</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="padding: 5px; font-size: 12px; border-radius: 10px;">
                <option value="all">ทั้งปี 2026</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        
        <div class="chart-container">
            <canvas id="balanceChart"></canvas>
        </div>

        <div class="result-row row-income">
            <span>รายรับรวม</span>
            <span id="sumIn">0 ฿</span>
        </div>
        <div class="result-row row-expense">
            <span>รายจ่ายรวม</span>
            <span id="sumOut">0 ฿</span>
        </div>
        <div class="result-row row-profit">
            <span>กำไรสุทธิ</span>
            <span id="sumNet" style="font-weight: bold;">0 ฿</span>
        </div>
    </div>

    <div class="section">
        <h2>📅 รายการย้อนหลัง</h2>
        <div id="displayList"></div>
        <p onclick="clearData()" style="text-align:center; font-size:10px; color:#ddd; margin-top:30px; cursor:pointer;">รีเซ็ตข้อมูล</p>
    </div>

    <p class="footer-text">CREATED BY NONGSORIN • 2026</p>
</div>

<script>
    // --- ระบบอิโมจิพื้นหลัง (ลดความถี่ลง) ---
    const emojiList = ['✨', '🌸', '💧'];
    function createBg() {
        if(document.querySelectorAll('.floating-emoji').length > 10) return;
        const e = document.createElement('div');
        e.className = 'floating-emoji';
        e.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 10 + 10) + 'px';
        e.style.animationDuration = (Math.random() * 10 + 10) + 's';
        document.getElementById('emoji-container').appendChild(e);
        setTimeout(() => e.remove(), 15000);
    }
    setInterval(createBg, 3000);

    // --- ระบบคำนวณเงิน ---
    let transactions = JSON.parse(localStorage.getItem('balanced_tracker_v2')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date || price <= 0) return alert('กรอกข้อมูลให้ครบถ้วนก่อนนะคะ');

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('balanced_tracker_v2', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';
        let tIn = 0, tOut = 0;

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;

            if(isMatch) {
                if(item.type === 'income') tIn += item.price;
                else tOut += (item.price + item.cost);

                listDiv.innerHTML += `
                    <div class="item-card">
                        <div>
                            <div style="font-size:14px; font-weight:500;">${item.desc}</div>
                            <small style="color:#aaa; font-size:10px;">${d.toLocaleDateString('th-TH')}</small>
                        </div>
                        <div style="color:${item.type==='income'?'#48bb78':'#f56565'}; font-weight:500;">
                            ${item.type==='income'?'+':'-'}${item.price.toLocaleString()}
                        </div>
                    </div>`;
            }
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        
        updateChart(tIn, tOut, net);
        if(!listDiv.innerHTML) listDiv.innerHTML = '<p style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">ไม่มีรายการจ้ะ</p>';
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('balanceChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไรสุทธิ'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#81e6e2', '#f28d8d', '#5c85d6'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                cutout: '75%',
                plugins: { legend: { display: false } }
            }
        });
    }

    function clearData() { if(confirm('ต้องการลบทั้งหมดใช่ไหม?')) { transactions = []; localStorage.clear(); calculateSummary(); } }
    
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
