<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - สมุดรายรับรายจ่ายดิจิทัล ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    /* ปรับโทนสีให้น่ารักและนุ่มนวลขึ้น (Pastel Tone) */
    --bg: #fdfbfb; /* สีพื้นหลังหลักแบบครีมเนยอ่อนๆ */
    --main: #81e6d9; /* สี Tiffany Blue ที่สว่างและนุ่มขึ้น */
    --main-light: #e6fffa; /* สี Tiffany แบบอ่อนมากสำหรับพื้นหลัง section */
    --dark: #4a5568; /* สีน้ำเงินเข้มปรับเป็นเทาเข้มเพื่อให้ดู soft ขึ้น */
    --accent: #feb2b2; /* สีแดงปรับเป็นชมพูพาสเทล */
    --white: #ffffff;
    --text: #2d3748; /* สีตัวอักษรปรับให้ soft ขึ้น */
    --glow: rgba(129, 230, 217, 0.3);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    background-color: var(--bg);
    position: relative;
    overflow-x: hidden;
    color: var(--text);
    display: flex;
    justify-content: center;
}

/* --- ลูกเล่นพื้นหลังเคลื่อนไหวแบบน่ารัก --- */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* ลายจุด Polka Dot แบบจางๆ */
    background-image: 
        radial-gradient(var(--main-light) 1.5px, transparent 1.5px),
        radial-gradient(var(--main-light) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
    background-position: 0 0, 20px 20px;
    opacity: 0.6;
    z-index: -2;
}

/* องค์ประกอบลอยๆ เพิ่มความดึ๋งดั๋ง */
.bg-deco {
    position: fixed;
    border-radius: 50%;
    opacity: 0.5;
    z-index: -1;
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
}

/* สร้างวงกลมลอยๆ หลายขนาดและสี */
.deco-1 { width: 100px; height: 100px; background: #e6fffa; top: 10%; left: -50px; animation-delay: 0s; }
.deco-2 { width: 150px; height: 150px; background: #fff5f5; bottom: 15%; right: -80px; animation-delay: 1s; }
.deco-3 { width: 70px; height: 70px; background: #faf5ff; top: 40%; right: 10%; animation-delay: 2s; }
.deco-4 { width: 50px; height: 50px; background: #ebf8ff; bottom: 30%; left: 15%; animation-delay: 3s; }

/* -------------------------------------- */

.container {
    max-width: 500px;
    width: 100%;
    padding: 20px 15px 60px;
    position: relative; /* เพื่อให้อยู่เหนือพื้นหลัง */
}

/* ส่วนกล่องเนื้อหา ปรับให้ดูนุ่มนวลขึ้น */
.section {
    background: rgba(255, 255, 255, 0.9); /* ทำให้โปร่งแสงนิดๆ เห็นลายหลัง */
    border-radius: 30px; /* ขอบมนขึ้น */
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03); /* เงาบางลง */
    border: 2px solid var(--white); /* เพิ่มขอบสีขาวให้ดู pop */
    backdrop-filter: blur(5px); /* เบลอพื้นหลังเล็กน้อย */
}

h1 { color: var(--dark); font-size: 32px; letter-spacing: 1px; font-weight: 500; }
h2 { color: var(--dark); font-size: 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; font-weight: 500;}
.center { text-align: center; }

/* โลโก้ - ปรับเปลี่ยนไฟล์และทำให้ดูเด่นขึ้น */
.logo {
    width: 140px; height: 140px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 20px;
    box-shadow: 0 10px 30px var(--glow);
    border: 5px solid var(--white);
    background-color: var(--white);
    transition: transform 0.3s ease;
}
.logo:hover {
    transform: scale(1.05) rotate(5deg);
}
.logo img { width: 100%; height: 100%; object-fit: cover; }

/* Badges ส่วนบน */
.badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}
.badge {
    background: var(--white);
    padding: 8px 18px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    font-size: 14px;
    color: var(--dark);
    border: 2px solid var(--main-light);
    font-weight: 400;
}

/* UI ส่วนกรอกข้อมูล ปรับขอบและสีให้ soft */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
}
input, select {
    width: 100%;
    padding: 15px 18px;
    border-radius: 18px;
    border: 2px solid #edf2f7;
    background: #fdfdfd;
    outline: none;
    transition: all 0.3s;
    font-size: 15px;
    color: var(--text);
}
input:focus, select:focus {
    border-color: var(--main);
    background: var(--white);
    box-shadow: 0 0 0 4px var(--glow);
}
input::placeholder { color: #a0aec0; }

/* ปุ่มต่างๆ ปรับให้นูนๆ น่ารัก */
.btn {
    display: block;
    text-align: center;
    padding: 16px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s;
    cursor: pointer;
    border: none;
    font-size: 16px;
    position: relative;
    overflow: hidden;
}
.btn::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.2);
    opacity: 0; transition: 0.3s;
}
.btn:hover::after { opacity: 1; }
.btn:active { transform: scale(0.96) translateY(2px); box-shadow: none; }

.btn-outline {
    background: var(--white);
    border: 2px dashed var(--main);
    color: var(--dark);
    margin-top: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
}
.btn-main {
    background: var(--main);
    color: var(--white);
    box-shadow: 0 6px 15px var(--glow);
}
.btn-accent {
    background: var(--accent);
    color: var(--white);
    box-shadow: 0 6px 15px rgba(254, 178, 178, 0.4);
}

/* รายการบันทึก */
#displayList {
    margin-top: 15px;
    max-height: 280px;
    overflow-y: auto;
    padding-right: 8px;
}
#displayList::-webkit-scrollbar { width: 6px; }
#displayList::-webkit-scrollbar-thumb { background: var(--main-light); border-radius: 10px; }
#displayList::-webkit-scrollbar-track { background: transparent; }

.item-card {
    background: var(--white);
    padding: 15px;
    border-radius: 18px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid var(--white);
    box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    transition: transform 0.2s;
}
.item-card:hover { transform: translateX(5px); background: var(--main-light); }
.item-info { display: flex; flex-direction: column; gap: 2px; }
.item-name { font-weight: 500; font-size: 15px; color: var(--text); }
.item-date { font-size: 12px; color: #a0aec0; }
.item-amount { font-weight: 500; font-size: 16px; }

/* สรุปยอด ปรับสีให้หวานขึ้น */
.price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    background: var(--main-light);
    padding: 15px 20px;
    border-radius: 20px;
    border: 2px solid var(--white);
}
.price-tag {
    background: var(--white);
    color: #48bb78; /* สีเขียวอ่อน */
    padding: 5px 18px;
    border-radius: 15px;
    font-weight: 500;
    min-width: 90px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
}

.footer { text-align: center; margin-top: 30px; }
.social { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
.social a {
    background: var(--white);
    padding: 10px 20px;
    border-radius: 15px;
    text-decoration: none;
    color: var(--dark);
    font-size: 14px;
    border: 2px solid #edf2f7;
    box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    transition: all 0.3s;
}
.social a:hover { border-color: var(--main); background: var(--main-light); color: var(--text); }
.small { font-size: 12px; color: #a0aec0; margin-top: 20px; }
</style>
</head>

<body>
    <div class="bg-deco deco-1"></div>
    <div class="bg-deco deco-2"></div>
    <div class="bg-deco deco-3"></div>
    <div class="bg-deco deco-4"></div>

<div class="container">

    <div class="section center" style="background:transparent; border:none; box-shadow:none; padding-bottom: 10px;">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="nongsorin logo">
        </div>
        <h1>nongsorin</h1>
        <p style="color: var(--dark); opacity: 0.8; font-size: 15px; margin-top: 5px;">จัดการเงินง่ายๆ ในสไตล์คุณ 🌸✨</p>
        
        <div class="badges" style="margin-top: 25px;">
            <div class="badge" id="badge-month">เดือนนี้: 0</div>
            <div class="badge" id="badge-year" style="border-color: var(--main);">ปีนี้: 0</div>
            <div class="badge">สรุปอัตโนมัติ 📊</div>
        </div>

        <button onclick="calculateSummary()" class="btn btn-outline">
            🔍 กรองข้อมูล & อัปเดตยอดเงิน
        </button>
    </div>

    <div class="section">
        <h2>📝 บันทึกรายรับ-รายจ่าย</h2>
        <div class="input-group">
            <input type="text" id="desc" placeholder="เช่น ขายของ, ซื้อกาแฟ... 🥤">
            <input type="number" id="amount" placeholder="จำนวนเงิน (บาท) 💰">
            <div style="display: flex; gap: 10px;">
                <select id="type" style="flex: 1;">
                    <option value="income">➕ รายรับ</option>
                    <option value="expense">➖ รายจ่าย</option>
                </select>
                <input type="date" id="date" style="flex: 1.5;">
            </div>
            <button onclick="addItem()" class="btn btn-main" style="margin-top: 10px;">บันทึกลงสมุด ✨</button>
        </div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
            <h2 style="margin:0;">📅 รายการเดือนนี้</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="width: auto; padding: 8px 15px; height: 40px; font-size: 14px; border-radius: 12px;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        
        <div id="displayList">
            </div>

        <button onclick="clearData()" style="background: none; border: none; color: #a0aec0; font-size: 13px; width: 100%; margin-top: 20px; cursor: pointer; text-decoration: underline;">
            ล้างข้อมูลทั้งหมด 🗑️
        </button>
    </div>

    <div class="section">
        <h2>💰 สรุปผลลัพธ์</h2>
        <div class="price-row">
            <span style="color: var(--dark); font-weight: 500;">รายรับ (In) 💚</span>
            <span class="price-tag" id="totalIncome" style="color: #48bb78;">0</span>
        </div>
        <div class="price-row" style="background: #fff5f5; border-color: #fff5f5;">
            <span style="color: #c53030; font-weight: 500;">รายจ่าย (Out) 💔</span>
            <span class="price-tag" id="totalExpense" style="color: #c53030; border-color: #fff5f5;">0</span>
        </div>
        <div class="price-row" style="background: var(--dark); color: white; border-color: var(--dark);">
            <span>คงเหลือรวม ⭐</span>
            <span id="netBalance" style="font-weight: 600; font-size: 20px; color: var(--main);">0</span>
        </div>

        <button class="btn btn-accent" style="width: 100%; margin-top: 15px;" onclick="exportToCSV()">
            📥 ดาวน์โหลดรายงานสรุป CSV
        </button>
    </div>

    <div class="footer">
        <a href="#" class="btn btn-main" style="display: inline-block; padding: 12px 35px; border-radius: 25px;">ติดต่อเรา 🎀</a>
        <div class="social">
            <a href="#">FB</a>
            <a href="#">IG</a>
            <a href="#">Line</a>
        </div>
        <p class="small">© 2026 nongsorin - Financial Tracker 🌱</p>
    </div>

</div>

<script>
    // ใช้ Key เดิมเพื่อให้ข้อมูลไม่หาย
    let transactions = JSON.parse(localStorage.getItem('nongsorin_pro_data')) || [];

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;

        if(!desc || isNaN(amount) || !date) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วนนะคะ 🥺');
            return;
        }

        transactions.push({ desc, amount, type, date });
        saveAndRender();
        
        // ล้างค่า input
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('nongsorin_pro_data', JSON.stringify(transactions));
        calculateSummary();
    }

    function calculateSummary() {
        const filterMonth = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';

        let income = 0;
        let expense = 0;
        let yearTotal = 0;
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();

        // เรียงลำดับวันที่ล่าสุดขึ้นก่อน
        const sortedData = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

        sortedData.forEach(item => {
            const d = new Date(item.date);
            const isMatch = filterMonth === 'all' || d.getMonth().toString() === filterMonth;
            
            // คำนวณยอดรวมทั้งปี (ปีปัจจุบัน)
            if(d.getFullYear() === currentYear) {
                yearTotal += (item.type === 'income' ? item.amount : -item.amount);
            }

            if(isMatch) {
                if(item.type === 'income') income += item.amount;
                else expense += item.amount;

                // กำหนดสีตามประเภท
                const amountColor = item.type === 'income' ? '#48bb78' : '#c53030';
                const typeSign = item.type === 'income' ? '+' : '-';

                listDiv.innerHTML += `
                    <div class="item-card">
                        <div class="item-info">
                            <span class="item-name">${item.desc}</span>
                            <span class="item-date">${d.toLocaleDateString('th-TH')}</span>
                        </div>
                        <span class="item-amount" style="color: ${amountColor}">
                            ${typeSign}${item.amount.toLocaleString('th-TH', {minimumFractionDigits: 2})}
                        </span>
                    </div>
                `;
            }
        });

        // อัปเดตตัวเลขหน้าจอ
        const badgeMonth = document.getElementById('badge-month');
        // คำนวณยอดเดือนปัจจุบันจริงๆ (ไม่ใช่ยอดที่กรอง)
        let currentMonthNet = 0;
        transactions.forEach(item => {
            const d = new Date(item.date);
            if(d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
                currentMonthNet += (item.type === 'income' ? item.amount : -item.amount);
            }
        });

        document.getElementById('totalIncome').innerText = income.toLocaleString('th-TH', {minimumFractionDigits: 2});
        document.getElementById('totalExpense').innerText = expense.toLocaleString('th-TH', {minimumFractionDigits: 2});
        document.getElementById('netBalance').innerText = (income - expense).toLocaleString('th-TH', {minimumFractionDigits: 2}) + ' ฿';
        
        badgeMonth.innerText = 'เดือนนี้: ' + currentMonthNet.toLocaleString('th-TH');
        document.getElementById('badge-year').innerText = 'ปี ' + currentYear + ': ' + yearTotal.toLocaleString('th-TH');
        
        if(listDiv.innerHTML === '') listDiv.innerHTML = '<p style="text-align:center; color:#a0aec0; font-size:14px; padding:30px;">ไม่มีข้อมูลรายการสำหรับเดือนนี้ค่ะ 🌸</p>';
    }

    function clearData() {
        if(confirm('คุณต้องการลบรายการทั้งหมดใช่ไหมคะ? ข้อมูลจะหายหมดเลยนะ 🥺')) {
            transactions = [];
            saveAndRender();
        }
    }

    function exportToCSV() {
        if(transactions.length === 0) return alert('ไม่มีข้อมูลให้ออกรายงานค่ะ 🥺');
        let csv = 'วันที่,รายการ,ประเภท,จำนวนเงิน\n';
        transactions.forEach(t => {
            const dateStr = new Date(t.date).toLocaleDateString('th-TH');
            const typeStr = t.type === 'income' ? 'รายรับ' : 'รายจ่าย';
            csv += `${dateStr},${t.desc},${typeStr},${t.amount}\n`;
        });
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `รายงาน_nongsorin_${new Date().toLocaleDateString('th-TH')}.csv`;
        link.click();
    }

    // กำหนดวันที่เริ่มต้นเป็นวันนี้
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
