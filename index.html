<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - ระบบคำนวณกำไรดิจิทัล</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --tiffany: #0abab5;
    --navy: #004080;
    --red: #e63946;
    --white: #ffffff;
    --glass: rgba(255, 255, 255, 0.9);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    /* พื้นหลังไล่เฉดสี แดง-น้ำเงิน-Tiffany */
    background: linear-gradient(135deg, #004080 0%, #0abab5 50%, #e63946 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    color: #333;
}

.container {
    max-width: 500px;
    width: 100%;
    padding: 20px 15px 60px;
}

.section {
    background: var(--glass);
    border-radius: 28px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
}

h1 { color: var(--white); text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-size: 32px; }
h2 { color: var(--navy); font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.center { text-align: center; }

/* โลโก้ */
.logo {
    width: 120px; height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 15px;
    border: 4px solid var(--white);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.logo img { width: 100%; height: 100%; object-fit: cover; }

/* Badges */
.badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}
.badge {
    background: var(--navy);
    padding: 6px 14px;
    border-radius: 12px;
    font-size: 12px;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.2);
}

/* UI ส่วนกรอกข้อมูล */
.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1.5px solid #ddd;
    outline: none;
    font-size: 14px;
}
input:focus { border-color: var(--tiffany); box-shadow: 0 0 8px rgba(10,186,181,0.3); }

/* ปุ่ม */
.btn {
    display: block; width: 100%;
    text-align: center; padding: 14px;
    border-radius: 15px; font-weight: 500;
    cursor: pointer; border: none; transition: 0.3s;
}
.btn-main { background: var(--tiffany); color: white; box-shadow: 0 4px 15px rgba(10,186,181,0.4); }
.btn-accent { background: var(--red); color: white; }
.btn-outline { background: transparent; border: 2px dashed var(--white); color: var(--white); margin-top: 10px; }

/* รายการบันทึก */
#displayList { margin-top: 10px; max-height: 200px; overflow-y: auto; }
.item-card {
    background: white; padding: 12px; border-radius: 15px;
    margin-bottom: 8px; display: flex; justify-content: space-between;
    border-left: 5px solid var(--tiffany);
}
.item-card.expense { border-left-color: var(--red); }

/* สรุปยอด */
.price-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; background: #f8f9fa;
    padding: 12px 18px; border-radius: 15px;
}
.price-tag { font-weight: 600; font-size: 16px; }

.footer { text-align: center; color: var(--white); font-size: 12px; margin-top: 20px; }
</style>
</head>

<body>
<div class="container">

    <div class="center" style="margin-bottom: 30px;">
        <div class="logo">
            <img src="https://via.placeholder.com/150" alt="logo">
        </div>
        <h1>nongsorin</h1>
        <div class="badges" style="margin-top: 15px;">
            <div class="badge" id="badge-profit">กำไรเดือนนี้: 0</div>
            <div class="badge" style="background: var(--red);" id="badge-year">ยอดขายปีนี้: 0</div>
        </div>
        <button onclick="calculateSummary()" class="btn btn-outline">🔍 อัปเดตข้อมูลสรุป ✨</button>
    </div>

    <div class="section">
        <h2>📊 บันทึกการขาย/ต้นทุน</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="ชื่อรายการ" style="grid-column: span 2;">
            <input type="number" id="cost" placeholder="ต้นทุน (บาท)">
            <input type="number" id="price" placeholder="ราคาขาย (บาท)">
            <input type="date" id="date" style="grid-column: span 2;">
        </div>
        <button onclick="addItem()" class="btn btn-main">บันทึกข้อมูล</button>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">📅 ประวัติรายการ</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="width: auto; padding: 5px;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
                <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
                <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        <div id="displayList"></div>
        <button onclick="clearData()" style="background:none; border:none; color:#999; font-size:11px; width:100%; margin-top:10px; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
    </div>

    <div class="section">
        <h2>💰 สรุปตัวเลขสุทธิ</h2>
        <div class="price-row">
            <span>ยอดขายรวม</span>
            <span class="price-tag" id="totalSales" style="color: var(--navy);">0</span>
        </div>
        <div class="price-row">
            <span>ต้นทุนรวม</span>
            <span class="price-tag" id="totalCost" style="color: var(--red);">0</span>
        </div>
        <div class="price-row" style="background: var(--tiffany); color: white;">
            <span>กำไรสุทธิ (Profit)</span>
            <span id="netProfit" style="font-weight: 600; font-size: 20px;">0</span>
        </div>
        <button class="btn btn-accent" style="margin-top: 15px;" onclick="exportToCSV()">📥 ดาวน์โหลดรายงานสรุป</button>
    </div>

    <div class="footer">
        © 2026 nongsorin - Financial Profit Tracker
    </div>

</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('nongsorin_biz_data')) || [];

    function addItem() {
        const desc = document.getElementById('desc').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const date = document.getElementById('date').value;

        if(!desc || !date) {
            alert('กรุณากรอกชื่อรายการและวันที่ค่ะ');
            return;
        }

        transactions.push({ desc, cost, price, date });
        localStorage.setItem('nongsorin_biz_data', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filterMonth = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';

        let totalSales = 0;
        let totalCost = 0;
        let yearSales = 0;
        const currentYear = new Date().getFullYear();

        const sortedData = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

        sortedData.forEach((item, index) => {
            const d = new Date(item.date);
            const isMatch = filterMonth === 'all' || d.getMonth().toString() === filterMonth;
            
            if(d.getFullYear() === currentYear) {
                yearSales += item.price;
            }

            if(isMatch) {
                totalSales += item.price;
                totalCost += item.cost;
                const profit = item.price - item.cost;

                listDiv.innerHTML += `
                    <div class="item-card ${item.price < item.cost ? 'expense' : ''}">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-weight:500;">${item.desc}</span>
                            <span style="font-size:11px; color:#999;">${d.toLocaleDateString('th-TH')}</span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:14px; color:var(--tiffany); font-weight:600;">กำไร: ${(profit).toLocaleString()}</div>
                            <div style="font-size:10px; color:#bbb;">ทุน: ${item.cost} | ขาย: ${item.price}</div>
                        </div>
                    </div>
                `;
            }
        });

        document.getElementById('totalSales').innerText = totalSales.toLocaleString() + ' ฿';
        document.getElementById('totalCost').innerText = totalCost.toLocaleString() + ' ฿';
        document.getElementById('netProfit').innerText = (totalSales - totalCost).toLocaleString() + ' ฿';
        document.getElementById('badge-profit').innerText = 'กำไรเดือนนี้: ' + (totalSales - totalCost).toLocaleString();
        document.getElementById('badge-year').innerText = 'ยอดขายปีนี้: ' + yearSales.toLocaleString();
    }

    function clearData() {
        if(confirm('ลบข้อมูลทั้งหมด?')) {
            transactions = [];
            localStorage.setItem('nongsorin_biz_data', JSON.stringify(transactions));
            calculateSummary();
        }
    }

    function exportToCSV() {
        let csv = 'วันที่,รายการ,ต้นทุน,ราคาขาย,กำไร\n';
        transactions.forEach(t => {
            csv += `${t.date},${t.desc},${t.cost},${t.price},${t.price - t.cost}\n`;
        });
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "nongsorin_profit_report.csv";
        link.click();
    }

    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
