<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nongsorin - Digital Profit Tracker 📈</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --tiffany: #0abab5;
    --navy: #004080;
    --red: #e63946;
    --white: #ffffff;
    --glass: rgba(255, 255, 255, 0.92);
}

*{margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #e6fffa, #fdfbfb, #ebf8ff, #fff5f5);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    position: relative;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* --- เพิ่มอิโมจิพื้นหลังเคลื่อนไหว --- */
.bg-emoji {
    position: fixed;
    font-size: 24px;
    z-index: -1;
    opacity: 0.5;
    animation: floatEmoji 10s linear infinite;
}

@keyframes floatEmoji {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

.container {
    max-width: 550px;
    width: 100%;
    padding: 30px 15px 80px;
    text-align: center;
    z-index: 1;
}

.header-section { margin-bottom: 30px; }

/* --- โลโก้แบบมีแสงออร่า --- */
.logo {
    width: 120px; height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 15px;
    border: 4px solid var(--white);
    position: relative;
    box-shadow: 0 0 20px rgba(10, 186, 181, 0.6), 0 0 40px rgba(10, 186, 181, 0.3);
    animation: logoGlow 3s ease-in-out infinite alternate;
}

@keyframes logoGlow {
    from { box-shadow: 0 0 20px rgba(10, 186, 181, 0.5); }
    to { box-shadow: 0 0 40px rgba(10, 186, 181, 0.9), 0 0 60px rgba(0, 64, 128, 0.4); }
}

.logo img { width: 100%; height: 100%; object-fit: cover; }

h1 { color: var(--navy); font-size: 32px; margin-bottom: 5px; }
.subtitle { color: var(--tiffany); font-size: 15px; margin-bottom: 20px; font-weight: 400; }

/* --- ปุ่มอัปเดตแบบแสงกระพริบ --- */
.btn-update-glow {
    background: var(--white);
    border: 2px solid var(--tiffany);
    color: var(--navy);
    position: relative;
    overflow: hidden;
    animation: pulseUpdate 2s infinite;
}

@keyframes pulseUpdate {
    0% { box-shadow: 0 0 0 0px rgba(10, 186, 181, 0.4); }
    70% { box-shadow: 0 0 0 15px rgba(10, 186, 181, 0); }
    100% { box-shadow: 0 0 0 0px rgba(10, 186, 181, 0); }
}

.section {
    background: var(--glass);
    border-radius: 28px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
}

h2 { color: var(--navy); font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }

.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.full-width { grid-column: span 2; }
input, select {
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    border: 1.5px solid #eee;
    background: #fff;
    font-size: 14px;
}

.btn {
    width: 100%;
    padding: 15px;
    border-radius: 18px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-size: 16px;
    transition: 0.3s;
}
.btn-main { background: var(--tiffany); color: white; margin-top: 15px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-box { background: white; padding: 15px; border-radius: 20px; }

.result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 20px; border-radius: 18px; margin-bottom: 10px;
}
.row-income { background: #e6fffa; color: #2d6a4f; }
.row-expense { background: #fff5f5; color: var(--red); }
.row-profit { background: var(--navy); color: white; margin-top: 15px; }

#displayList { max-height: 300px; overflow-y: auto; margin-top: 15px; }
.item-card {
    background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center; text-align: left;
}

.chart-container { margin: 20px auto; max-width: 250px; }
.footer-text { color: var(--navy); opacity: 0.5; font-size: 12px; margin-top: 30px; }
</style>
</head>

<body>

<div id="emoji-container"></div>

<div class="container">

    <div class="header-section">
        <div class="logo">
            <img src="att.0s6x5y6gyBz3Q27JNKonjuezkpDX0Fr1zY9NUqwywz4.jpeg" alt="nongsorin logo">
        </div>
        <h1>nongsorin</h1>
        <p class="subtitle">บันทึกกำไรดีๆ มีความสุขทุกการใช้จ่าย 🌸</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span style="font-size:12px; color:#888;">กำไรเดือนนี้</span><br>
                <span id="badge-month" style="font-weight:600; color:var(--navy);">0</span>
            </div>
            <div class="stat-box">
                <span style="font-size:12px; color:#888;">รวมทั้งปี 2026</span><br>
                <span id="badge-year" style="font-weight:600; color:var(--tiffany);">0</span>
            </div>
        </div>
        
        <button onclick="calculateSummary()" class="btn btn-update-glow">🔄 อัปเดตข้อมูลสรุปยอดเงิน</button>
    </div>

    <div class="section">
        <h2>📝 เพิ่มรายการใหม่</h2>
        <div class="input-grid">
            <input type="text" id="desc" placeholder="ชื่อรายการ" class="full-width">
            <select id="type">
                <option value="income">➕ รายรับ</option>
                <option value="expense">➖ รายจ่าย</option>
            </select>
            <input type="date" id="date">
            <input type="number" id="cost" placeholder="ต้นทุน">
            <input type="number" id="price" placeholder="ราคาขาย">
        </div>
        <button onclick="addItem()" class="btn btn-main">บันทึกข้อมูล ✨</button>
    </div>

    <div class="section">
        <h2>📊 สัดส่วนทางการเงิน</h2>
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
        <div class="result-row row-income"><span>รายรับรวม</span><span id="sumIn">0 ฿</span></div>
        <div class="result-row row-expense"><span>รายจ่ายรวม</span><span id="sumOut">0 ฿</span></div>
        <div class="result-row row-profit"><span>กำไรสุทธิ</span><span id="sumNet" style="font-size:20px;">0 ฿</span></div>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">📅 ประวัติรายการ</h2>
            <select id="filterMonth" onchange="calculateSummary()" style="width:auto;">
                <option value="all">ทั้งหมด</option>
                <option value="0">ม.ค.</option><option value="1">ก.พ.</option>
                <option value="2">มี.ค.</option><option value="3">เม.ย.</option>
                <option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
                <option value="6">ก.ค.</option><option value="7">ส.ค.</option>
                <option value="8">ก.ย.</option><option value="9">ต.ค.</option>
                <option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
            </select>
        </div>
        <div id="displayList"></div>
        <button onclick="clearData()" style="background:none; border:none; color:#bbb; font-size:11px; margin-top:20px; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
    </div>

    <p class="footer-text">© 2026 nongsorin - Digital Profit Journal</p>
</div>

<script>
    // สร้างอิโมจิลอยหลังพื้นหลัง
    const emojis = ['Ⓜ️', '🦋', '🪼', '🐳', '🐠'];
    const container = document.getElementById('emoji-container');
    
    function createEmoji() {
        const emoji = document.createElement('div');
        emoji.className = 'bg-emoji';
        emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + 'vw';
        emoji.style.animationDuration = (Math.random() * 5 + 5) + 's';
        container.appendChild(emoji);
        setTimeout(() => emoji.remove(), 10000);
    }
    setInterval(createEmoji, 1500);

    let transactions = JSON.parse(localStorage.getItem('nongsorin_biz_data')) || [];
    let myChart = null;

    function addItem() {
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if(!desc || !date) { alert('กรุณากรอกข้อมูลให้ครบถ้วนนะคะ 🥺'); return; }

        transactions.push({ desc, type, date, cost, price });
        localStorage.setItem('nongsorin_biz_data', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('price').value = '';
        calculateSummary();
    }

    function calculateSummary() {
        const filter = document.getElementById('filterMonth').value;
        const listDiv = document.getElementById('displayList');
        listDiv.innerHTML = '';
        let tIn = 0, tOut = 0, yNet = 0;
        const year = new Date().getFullYear();

        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
        sorted.forEach(item => {
            const d = new Date(item.date);
            const isMatch = filter === 'all' || d.getMonth().toString() === filter;
            const profit = item.type === 'income' ? (item.price - item.cost) : -item.cost;

            if(d.getFullYear() === year) yNet += profit;

            if(isMatch) {
                if(item.type === 'income') tIn += item.price;
                else tOut += item.cost;

                listDiv.innerHTML += `
                    <div class="item-card" style="border-left:5px solid ${item.type==='income'?'#0abab5':'#e63946'}">
                        <div><b>${item.desc}</b><br><small>${d.toLocaleDateString('th-TH')}</small></div>
                        <div style="text-align:right"><b style="color:${profit>=0?'#0abab5':'#e63946'}">${profit.toLocaleString()} ฿</b></div>
                    </div>`;
            }
        });

        document.getElementById('sumIn').innerText = tIn.toLocaleString() + ' ฿';
        document.getElementById('sumOut').innerText = tOut.toLocaleString() + ' ฿';
        const net = tIn - tOut;
        document.getElementById('sumNet').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-month').innerText = net.toLocaleString() + ' ฿';
        document.getElementById('badge-year').innerText = yNet.toLocaleString() + ' ฿';
        updateChart(tIn, tOut, net);
    }

    function updateChart(inc, out, net) {
        const ctx = document.getElementById('profitChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['รายรับ', 'รายจ่าย', 'กำไร'],
                datasets: [{
                    data: [inc, out, net > 0 ? net : 0],
                    backgroundColor: ['#0abab5', '#e63946', '#004080'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, cutout: '70%' }
        });
    }

    function clearData() { if(confirm('ลบข้อมูลทั้งหมด?')) { transactions = []; localStorage.clear(); calculateSummary(); } }
    document.getElementById('date').valueAsDate = new Date();
    calculateSummary();
</script>

</body>
</html>
